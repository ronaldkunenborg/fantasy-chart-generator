    <link rel="stylesheet" href="d3-fantasychart.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <script>
        //////////////////////////////////////////////////////////////////////////////////////////////////////////////////// 
        // Description
        //////////////////////////////////////////////////////////////////////////////////////////////////////////////////// 
        //
        // Intent: Create a fantasy map using Perlin noise.
        //  
        // The map will consist of different terrains: water, beach, grassland, forest, mountain, and snow.
        // The map will be generated using Perlin noise, with the terrain type determined by the noise value.
        // The map will be *finite* in size, with the player starting at the center of the map.
        // The edge of the map will be at x = 0, y = 0 and player_starting_position_x*2, player_starting_position_y*2 respectively.
        // Once you reach the edge, the terrain will turn into beach (1 tile at the edge),
        // then water for negative x or y values, or for values larger than 2*player_x or 2*player_y.
        // 
        // At the start, the player is at the center of the map.
        // The player will be able to move around the map by pressing the WASD keys.
        // The player will not be able to move into the water.
        // The player will be able to move into the beach, but only if the player is moving away from the water.
        // The player will be able to move into the grassland, forest, mountain, and snow.
        // The player will not be able to move off the map.

        //////////////////////////////////////////////////////////////////////////////////////////////////////////////////// 
        // Settings
        //////////////////////////////////////////////////////////////////////////////////////////////////////////////////// 

        // Tile settings
        const TILE_SIZE = 8;         // Size of tile in pixels
        const MIN_TILE_PIXEL_SIZE = 1; // hard floor: tiles should never render below 1 px
        const MOVE_AMOUNT = TILE_SIZE; // Nr of pixels to move when a key is pressed
        const NOISE_ZOOM = 10;       // Zoom level for the noise function. Higher zoom gives less variation in terrain.
        const USE_TERRAIN_CACHE = true; // Toggle terrain cache for performance testing
        const USE_RANDOM_WATER_COLOR = false; // Toggle random water/ocean shading
        const USE_ALLOCATION_FREE_REDRAW = true; // Toggle draw path that avoids per-frame tile-object allocation
        const USE_TERRAIN_TEXTURES = true; // Render selected terrains with image-like texture patterns
        const TERRAIN_TEXTURE_ROOT = "textures"; // Folder with generated biome texture PNG files
        // Background music attribution:
        // Artist: MaxKoMusic
        // Source: https://www.newgrounds.com/audio/listen/1428973
        const BACKGROUND_MUSIC_URL = "music/1428973_Magical-Forest.mp3";
        const DEFAULT_BACKGROUND_MUSIC_VOLUME = 0.35;
        const ENABLE_PROCEDURAL_CLOUDS = true;
        const CLOUD_COUNT = 44; // world-space cloud sprites (anchored to terrain)
        const CLOUD_SPRITE_SIZE = 220;
        const CLOUD_RADIUS_MIN_TILES = 14;
        const CLOUD_RADIUS_MAX_TILES = 34;
        const CLOUD_SPEED_MIN_TILES_PER_SEC = 2.2;
        const CLOUD_SPEED_MAX_TILES_PER_SEC = 5.8;
        const CLOUD_MAX_OPACITY = 0.62;
        const CLOUD_ANIMATION_FPS = 14;
        const CLOUD_DENSITY_SLIDER_SCALE = 1.56; // slider 50% maps to effective density 0.78
        const MIN_TEXTURE_TILE_PIXEL_SIZE = 3; // below this, use flat colors instead of textures
        let moistureMultiplier = 0.5; // Global moisture tuning from UI slider
        let mountainMultiplier = 0.5; // Global mountain tuning from UI slider (coverage + intensity)
        let islandShapeMultiplier = 0.5; // Global island edge shaping (center emphasis + coast irregularity)
        let cloudDensityMultiplier = 0.78; // Effective cloud amount/opacity after slider scaling
        let useIceColorBlending = true; // Toggle for performance testing

        // Map settings
        const PLAYER_STARTING_POSITION_X = 1000; // Player starting x-coordinate
        const PLAYER_STARTING_POSITION_Y = 1000; // Player starting y-coordinate
        const MAP_X_MIN = 0;         // Top x-coordinate of the map
        const MAP_Y_MIN = 0;         // Top y-coordinate of the map
        const MAP_X_MAX = PLAYER_STARTING_POSITION_X * 2; // Bottom x-coordinate of the map
        const MAP_Y_MAX  = PLAYER_STARTING_POSITION_Y * 2; // Bottom y-coordinate of the map

        // Terrain fallback colors for each terrain type (used when no texture is available).
        // Values tuned to match average colors of the generated textures in /textures.
        const TERRAIN_COLORS = {
            ocean: "#37498b",
            water: "#6b81da",
            lake: "#5f78cf",
            ocean_ice: "#b9c9e3",
            water_ice: "#d4e3f2",
            beach: "#d3ba75",
            desert: "#d4ba76", // was #d3ba75
            shrubland: "#91a56b", // was #8fa369
            grassland: "#6ea64b", // was #6ca549
            plains: "#99b16b", // was #98b06a
            temperate_forest: "#487b50", // was #487c50
            rainforest: "#2b6741", // was #2a6740
            taiga: "#647d6b", // was #647e6b
            tundra: "#939a9d", // was #929a9c
            forest: "#43764f", // was #40744c
            forest2: "#487c50",
            alpine: "#bfbeb8", // was #bebdb7
            alpine_tundra: "#a5a9b4", // was #a4a9b3
            mountaintop: "#edf0f8",
            mountain: "#96948e", // was #95938d
            mountain2: "#a4a9b3",
            snow: "#eff2fc" // was #edf0f8
        };
        const OCEAN_ICE_TEMPERATURE_START = 0.18;
        const OCEAN_ICE_TEMPERATURE_END = 0.30;
        const WATER_ICE_TEMPERATURE_START = 0.22;
        const WATER_ICE_TEMPERATURE_END = 0.34;
        const ICE_TRANSITION_NOISE_STRENGTH = 0.08;
        const BASE_OCEAN_ELEVATION = 0.08;
        const BASE_WATER_ELEVATION = 0.10;
        const BASE_COAST_ELEVATION = 0.12;
        const OCEAN_CONNECTIVITY_MAX_NODES = 28000;
        const ENABLE_RIVER_OVERLAY = true;
        const RIVER_MIN_FLOW_DROP = 0.001;
        const RIVER_SOURCE_MIN_MOISTURE = 0.34;
        const RIVER_SOURCE_MIN_ELEVATION = 0.54;
        const RIVER_SOURCE_MAX_ELEVATION = 0.96;
        const RIVER_SOURCE_MIN_RIDGE = 0.45;
        const RIVER_SOURCE_MIN_GLACIER = 0.08;
        const RIVER_SOURCE_NOISE_ZOOM = 140;
        const RIVER_SOURCE_NOISE_THRESHOLD = 0.6;
        const RIVER_SOURCE_MIN_DOWNHILL_NEIGHBORS = 2;
        const RIVER_LAKE_SPILL_MAX_RISE = 0.0014;
        const RIVER_FLOW_ATTENUATION = 1.0;
        const RIVER_MIN_VISIBLE_FLOW = 1.35;
        const RIVER_DELTA_FLOW_THRESHOLD = 7.5;
        const RIVER_MIN_DRAW_PIXEL_SIZE = 2;
        const RIVER_LINE_WIDTH_FACTOR = 0.22;
        const RIVER_COLOR = "#2f66c7";
        const RIVER_ICE_COLOR = "#dce9fb";
        const ENABLE_OCEAN_MOUNTAIN_PATH_PREVIEW = true;
        const OCEAN_MOUNTAIN_PATH_COUNT = 28;
        const OCEAN_MOUNTAIN_CANDIDATE_SAMPLE_STEP = 24;
        const OCEAN_MOUNTAIN_MIN_CANDIDATE_ELEVATION = 0.74;
        const OCEAN_MOUNTAIN_MIN_PEAK_SPACING = 120;
        const OCEAN_MOUNTAIN_MAX_OCEAN_SEARCH_RADIUS = 520;
        const OCEAN_MOUNTAIN_PATH_MAX_STEPS = 3200;
        const OCEAN_MOUNTAIN_FALLBACK_MAX_NODES = 24000;
        const PATH_MEANDER_NOISE_STRENGTH = 0.65;
        const PATH_STRAIGHT_PENALTY = 0.28;
        const PATH_UPHILL_PENALTY = 24.0;
        const PATH_DOWNHILL_BONUS = 6.0;
        const PATH_TARGET_PULL = 0.045;
        const PATH_AWAY_TARGET_PENALTY = 1.15;
        const PATH_PREVIEW_COLOR = "rgba(44, 130, 240, 0.86)";
        const PATH_PREVIEW_DRAW_OVER_WATER = false;

        // World terrain/biome reference ranges for later biome correlation work.
        // Temperature + precipitation values are based on NASA "Mission: Biomes":
        // https://science.nasa.gov/kids/earth/mission-biomes/
        // (desert, tundra, grassland, rainforest, shrubland, coniferous, temperate deciduous)
        // Elevation bands are practical global terrain heuristics (typical occurrence bands).
        // `elevationNorm` uses this map's internal 0..1 elevation space.
        // `moistureNorm` is a 0..1 moisture proxy tuned to this project model.
        const WORLD_TERRAIN_RANGES = window.WORLD_TERRAIN_RANGES || [];

        // Terrain model tuning
        const TERRAIN_MODEL = {
            // deterministic offsets to derive independent noise fields from one seeded generator
            elevationOffsetX: 1013,
            elevationOffsetY: -809,
            moistureOffsetX: -4777,
            moistureOffsetY: 2089,
            ridgeOffsetX: 3307,
            ridgeOffsetY: -7123,
            mountainnessOffsetX: 9017,
            mountainnessOffsetY: -4561,
            coastOffsetX: -1861,
            coastOffsetY: 7421,

            // fBm settings
            octaves: 5,
            lacunarity: 2.0,
            gain: 0.5,

            // redistribution shaping
            elevationExponent: 1.10,
            moistureExponent: 1.05,
            islandMix: 0.55,
            islandCoastJitterStrength: 0.18,
            islandDistancePower: 1.10,
            islandCoastNoiseZoom: 55,

            // regional terrain shaping
            mountainRegionZoom: 42,
            mountainRegionThreshold0: 0.52,
            mountainRegionThreshold1: 0.78,
            mountainRegionProfilePower: 1.8,
            mountainBaseEdge: 0.62,
            mountainBaseCore: 0.82,
            mountainBlendStrength: 0.88,
            waterRegionProfilePower: 1.6,
            waterBaseEdge: 0.40,
            waterBaseCore: 0.26,
            waterBlendStrength: 0.32,
            lowlandSinkStrength: 0.16,
            coastalSinkStart: 0.68,
            coastalSinkStrength: 0.26,
            coastalMountainSuppressionStart: 0.72
        };

        const terrainBaseCache = new Map();
        const terrainCache = new Map();
        const oceanConnectivityCache = new Map();
        const terrainPatternCache = new Map();
        const terrainPatternLoadState = new Map();
        const riverSourceCache = new Map();
        const riverFlowDirectionCache = new Map();
        const riverFlowAccumulationCache = new Map();
        const riverTileActiveCache = new Map();
        const pathPreviewTileCache = new Set();
        const pathPreviewOceanReplacementTileCache = new Set();
        let pathPreviewDirty = true;
        let pathPreviewGeneratedCount = 0;
        let terrainLayerCanvas = null;
        let terrainLayerContext = null;
        const cloudSprites = [];
        let renderMsEma = 0;

        const RIVER_DIR_NORTH = 1;
        const RIVER_DIR_EAST = 2;
        const RIVER_DIR_SOUTH = 4;
        const RIVER_DIR_WEST = 8;
        const RIVER_DIR_NORTHEAST = 16;
        const RIVER_DIR_SOUTHEAST = 32;
        const RIVER_DIR_SOUTHWEST = 64;
        const RIVER_DIR_NORTHWEST = 128;
        const FLOW_DIRECTIONS = [
            { dx: 0, dy: -1, bit: RIVER_DIR_NORTH, oppositeBit: RIVER_DIR_SOUTH, length: 1 },
            { dx: 1, dy: 0, bit: RIVER_DIR_EAST, oppositeBit: RIVER_DIR_WEST, length: 1 },
            { dx: 0, dy: 1, bit: RIVER_DIR_SOUTH, oppositeBit: RIVER_DIR_NORTH, length: 1 },
            { dx: -1, dy: 0, bit: RIVER_DIR_WEST, oppositeBit: RIVER_DIR_EAST, length: 1 },
            { dx: 1, dy: -1, bit: RIVER_DIR_NORTHEAST, oppositeBit: RIVER_DIR_SOUTHWEST, length: Math.SQRT2 },
            { dx: 1, dy: 1, bit: RIVER_DIR_SOUTHEAST, oppositeBit: RIVER_DIR_NORTHWEST, length: Math.SQRT2 },
            { dx: -1, dy: 1, bit: RIVER_DIR_SOUTHWEST, oppositeBit: RIVER_DIR_NORTHEAST, length: Math.SQRT2 },
            { dx: -1, dy: -1, bit: RIVER_DIR_NORTHWEST, oppositeBit: RIVER_DIR_SOUTHEAST, length: Math.SQRT2 }
        ];

        //////////////////////////////////////////////////////////////////////////////////////////////////////////////////// 
        // Functions
        //////////////////////////////////////////////////////////////////////////////////////////////////////////////////// 

        // Function for terrain generation
        // This function generates a terrain type based on the noise value at a given (x, y) coordinate.
        // Please read https://www.redblobgames.com/maps/terrain-from-noise/ for ideas on what I am trying to do here.
        function clamp01(v) {
            return Math.max(0, Math.min(1, v));
        }

        function normalizeNoise(v) {
            // perlin2 outputs roughly [-1..1]; normalize to [0..1]
            return clamp01((v + 1) * 0.5);
        }

        function smoothstep(edge0, edge1, x) {
            const t = clamp01((x - edge0) / (edge1 - edge0));
            return t * t * (3 - 2 * t);
        }

        function hexToRgb(hex) {
            const h = hex.replace("#", "");
            const value = parseInt(h, 16);
            return {
                r: (value >> 16) & 255,
                g: (value >> 8) & 255,
                b: value & 255
            };
        }

        function mixHexColors(hexA, hexB, t) {
            const a = hexToRgb(hexA);
            const b = hexToRgb(hexB);
            const u = clamp01(t);
            const r = Math.round(a.r + ((b.r - a.r) * u));
            const g = Math.round(a.g + ((b.g - a.g) * u));
            const bb = Math.round(a.b + ((b.b - a.b) * u));
            return `rgb(${r}, ${g}, ${bb})`;
        }

        function fbmNoise2(x, y, zoom, offsetX, offsetY) {
            let amplitude = 1.0;
            let frequency = 1.0;
            let sum = 0.0;
            let amplitudeSum = 0.0;

            for (let i = 0; i < TERRAIN_MODEL.octaves; i += 1) {
                const nx = ((x + offsetX) / zoom) * frequency;
                const ny = ((y + offsetY) / zoom) * frequency;
                sum += noise.perlin2(nx, ny) * amplitude;
                amplitudeSum += amplitude;
                frequency *= TERRAIN_MODEL.lacunarity;
                amplitude *= TERRAIN_MODEL.gain;
            }
            return sum / amplitudeSum;
        }

        function ridgedNoise2(x, y, zoom, offsetX, offsetY) {
            // Ridged variant often used for mountain-like structures.
            // Inspired by Red Blob's recommendation to combine noise variants for landform detail.
            const n = fbmNoise2(x, y, zoom, offsetX, offsetY);
            return 1.0 - Math.abs(n); // [0..1] with sharp ridges near 1
        }

        function clearTerrainDerivedCaches() {
            terrainBaseCache.clear();
            terrainCache.clear();
            oceanConnectivityCache.clear();
            riverSourceCache.clear();
            riverFlowDirectionCache.clear();
            riverFlowAccumulationCache.clear();
            riverTileActiveCache.clear();
            pathPreviewTileCache.clear();
            pathPreviewOceanReplacementTileCache.clear();
            pathPreviewDirty = true;
            pathPreviewGeneratedCount = 0;
        }

        function isPathPreviewWaterTile(info) {
            return (
                info.zone === "outside" ||
                info.biome === "ocean" ||
                info.biome === "shallow_water" ||
                info.biome === "lake" ||
                info.biome === "coast"
            );
        }

        function isPathPreviewOceanDestinationTile(info) {
            return info.zone === "outside";
        }

        function getNearestMapEdgePoint(x, y) {
            const topDistance = Math.abs(y - MAP_Y_MIN);
            const bottomDistance = Math.abs(MAP_Y_MAX - y);
            const leftDistance = Math.abs(x - MAP_X_MIN);
            const rightDistance = Math.abs(MAP_X_MAX - x);
            const minDistance = Math.min(topDistance, bottomDistance, leftDistance, rightDistance);
            if (minDistance === topDistance) {
                return { x: x, y: MAP_Y_MIN };
            }
            if (minDistance === bottomDistance) {
                return { x: x, y: MAP_Y_MAX };
            }
            if (minDistance === leftDistance) {
                return { x: MAP_X_MIN, y: y };
            }
            return { x: MAP_X_MAX, y: y };
        }

        function isPathPreviewMountainCandidate(info) {
            if (info.zone !== "inland") {
                return false;
            }
            const mountainLike =
                info.biome === "mountaintop" ||
                info.biome === "alpine" ||
                info.biome === "alpine_tundra" ||
                info.biome === "mountain";
            return mountainLike && info.elevation >= OCEAN_MOUNTAIN_MIN_CANDIDATE_ELEVATION;
        }

        function isPathPreviewLandTile(info) {
            return (
                info.zone === "inland" &&
                info.biome !== "ocean" &&
                info.biome !== "shallow_water" &&
                info.biome !== "lake" &&
                info.biome !== "coast"
            );
        }

        function traceLineToEdge(startX, startY, targetX, targetY) {
            const path = [];
            let x0 = startX;
            let y0 = startY;
            const x1 = targetX;
            const y1 = targetY;
            const dx = Math.abs(x1 - x0);
            const sx = x0 < x1 ? 1 : -1;
            const dy = -Math.abs(y1 - y0);
            const sy = y0 < y1 ? 1 : -1;
            let err = dx + dy;
            let steps = 0;

            while (steps < OCEAN_MOUNTAIN_PATH_MAX_STEPS) {
                if (x0 < MAP_X_MIN || x0 > MAP_X_MAX || y0 < MAP_Y_MIN || y0 > MAP_Y_MAX) {
                    break;
                }
                path.push({ x: x0, y: y0 });
                if (x0 === x1 && y0 === y1) {
                    break;
                }
                const e2 = err * 2;
                if (e2 >= dy) {
                    err += dy;
                    x0 += sx;
                }
                if (e2 <= dx) {
                    err += dx;
                    y0 += sy;
                }
                steps += 1;
            }
            return path;
        }

        function traceMeanderingDownhillToEdge(startX, startY, targetX, targetY) {
            const path = [];
            const visited = new Set();
            let x = startX;
            let y = startY;
            let previousDirection = null;

            for (let step = 0; step < OCEAN_MOUNTAIN_PATH_MAX_STEPS; step += 1) {
                const key = `${x},${y}`;
                if (visited.has(key)) {
                    break;
                }
                visited.add(key);
                path.push({ x: x, y: y });

                if (x === targetX && y === targetY) {
                    return path;
                }

                const currentInfo = getCachedTerrainInfo(x, y);
                const currentTargetDistance = Math.hypot(targetX - x, targetY - y);
                let bestDirection = null;
                let bestScore = Number.POSITIVE_INFINITY;

                for (const direction of FLOW_DIRECTIONS) {
                    const nx = x + direction.dx;
                    const ny = y + direction.dy;
                    if (nx < MAP_X_MIN || nx > MAP_X_MAX || ny < MAP_Y_MIN || ny > MAP_Y_MAX) {
                        continue;
                    }

                    const neighborKey = `${nx},${ny}`;
                    const neighborInfo = getCachedTerrainInfo(nx, ny);
                    const targetDistance = Math.hypot(targetX - nx, targetY - ny);
                    const drop = currentInfo.elevation - neighborInfo.elevation;
                    const uphill = Math.max(0, -drop);
                    const downhill = Math.max(0, drop);
                    const awayDistance = Math.max(0, targetDistance - currentTargetDistance);
                    const revisitPenalty = visited.has(neighborKey) ? 2000 : 0;
                    const straightPenalty =
                        previousDirection && previousDirection.bit === direction.bit ? PATH_STRAIGHT_PENALTY : 0;
                    const reversePenalty =
                        previousDirection && previousDirection.oppositeBit === direction.bit ? 400 : 0;
                    const meanderNoise =
                        (normalizeNoise(
                            fbmNoise2(
                                nx,
                                ny,
                                28,
                                TERRAIN_MODEL.coastOffsetX + 7511,
                                TERRAIN_MODEL.coastOffsetY - 3617
                            )
                        ) - 0.5) * PATH_MEANDER_NOISE_STRENGTH;

                    const score =
                        (targetDistance * PATH_TARGET_PULL) +
                        (awayDistance * PATH_AWAY_TARGET_PENALTY) +
                        (uphill * PATH_UPHILL_PENALTY) -
                        (downhill * PATH_DOWNHILL_BONUS) +
                        straightPenalty +
                        reversePenalty +
                        revisitPenalty +
                        meanderNoise;

                    if (score < bestScore) {
                        bestScore = score;
                        bestDirection = direction;
                    }
                }

                if (!bestDirection) {
                    break;
                }

                x += bestDirection.dx;
                y += bestDirection.dy;
                previousDirection = bestDirection;
            }

            if (path.length > 0) {
                const tail = path[path.length - 1];
                if (tail.x !== targetX || tail.y !== targetY) {
                    const tailConnector = traceLineToEdge(tail.x, tail.y, targetX, targetY);
                    if (tailConnector.length > 1) {
                        return path.concat(tailConnector.slice(1));
                    }
                }
            }
            return path;
        }

        function ensurePathPreviewTiles() {
            if (!ENABLE_OCEAN_MOUNTAIN_PATH_PREVIEW || !pathPreviewDirty) {
                return;
            }

            pathPreviewTileCache.clear();
            pathPreviewOceanReplacementTileCache.clear();
            pathPreviewGeneratedCount = 0;
            const candidates = [];
            for (let x = MAP_X_MIN; x <= MAP_X_MAX; x += OCEAN_MOUNTAIN_CANDIDATE_SAMPLE_STEP) {
                for (let y = MAP_Y_MIN; y <= MAP_Y_MAX; y += OCEAN_MOUNTAIN_CANDIDATE_SAMPLE_STEP) {
                    const info = getCachedTerrainInfo(x, y);
                    if (!isPathPreviewMountainCandidate(info)) {
                        continue;
                    }
                    candidates.push({
                        x: x,
                        y: y,
                        elevation: info.elevation
                    });
                }
            }
            candidates.sort((a, b) => b.elevation - a.elevation);

            const selectedPeaks = [];
            for (const candidate of candidates) {
                if (selectedPeaks.length >= OCEAN_MOUNTAIN_PATH_COUNT) {
                    break;
                }
                let tooClose = false;
                for (const peak of selectedPeaks) {
                    if (Math.hypot(peak.x - candidate.x, peak.y - candidate.y) < OCEAN_MOUNTAIN_MIN_PEAK_SPACING) {
                        tooClose = true;
                        break;
                    }
                }
                if (tooClose) {
                    continue;
                }
                selectedPeaks.push(candidate);
            }

            for (const peak of selectedPeaks) {
                const edgeTarget = getNearestMapEdgePoint(peak.x, peak.y);
                const path = traceMeanderingDownhillToEdge(peak.x, peak.y, edgeTarget.x, edgeTarget.y);
                if (path.length === 0) {
                    continue;
                }

                for (const tile of path) {
                    pathPreviewTileCache.add(`${tile.x},${tile.y}`);
                }
                // Ocean replacement pass from map-edge endpoint inward:
                // convert contiguous non-land path tiles to ocean-style tiles,
                // stop once we hit the first true land tile.
                for (let i = path.length - 1; i >= 0; i -= 1) {
                    const tile = path[i];
                    const info = getCachedTerrainInfo(tile.x, tile.y);
                    if (isPathPreviewLandTile(info)) {
                        break;
                    }
                    pathPreviewOceanReplacementTileCache.add(`${tile.x},${tile.y}`);
                }
                pathPreviewGeneratedCount += 1;
            }

            pathPreviewDirty = false;
        }

        function isRiverLandTile(info) {
            return (
                info.zone === "inland" &&
                info.biome !== "ocean" &&
                info.biome !== "shallow_water" &&
                info.biome !== "lake" &&
                info.biome !== "coast"
            );
        }

        function getRiverOrientationFromMask(mask) {
            if (mask === 0) return "none";
            return `mask-${mask}`;
        }

        function hasLocalRiverSourcePotential(x, y, info) {
            if (!ENABLE_RIVER_OVERLAY || !isRiverLandTile(info)) {
                return false;
            }
            if (info.moisture < RIVER_SOURCE_MIN_MOISTURE) {
                return false;
            }
            if (info.elevation < RIVER_SOURCE_MIN_ELEVATION || info.elevation > RIVER_SOURCE_MAX_ELEVATION) {
                return false;
            }
            const isMountainBiome =
                info.biome === "mountain" ||
                info.biome === "alpine" ||
                info.biome === "alpine_tundra" ||
                info.biome === "mountaintop";
            if (!isMountainBiome) {
                return false;
            }
            if (info.ridge < RIVER_SOURCE_MIN_RIDGE) {
                return false;
            }

            const sourceKey = `${x},${y}`;
            if (riverSourceCache.has(sourceKey)) {
                return riverSourceCache.get(sourceKey);
            }
            let downhillNeighborCount = 0;
            for (const direction of FLOW_DIRECTIONS) {
                const neighborInfo = getCachedTerrainInfo(x + direction.dx, y + direction.dy);
                if (!isRiverLandTile(neighborInfo)) {
                    continue;
                }
                if ((info.elevation - neighborInfo.elevation) > RIVER_MIN_FLOW_DROP) {
                    downhillNeighborCount += 1;
                }
            }
            const moistureScore = clamp01((info.moisture - RIVER_SOURCE_MIN_MOISTURE) / (1 - RIVER_SOURCE_MIN_MOISTURE));
            const glacierFactor = Math.max(
                info.waterIceFactor || 0,
                clamp01((0.42 - info.temperature) / 0.42)
            );
            const sourceNoise = normalizeNoise(
                fbmNoise2(
                    x,
                    y,
                    RIVER_SOURCE_NOISE_ZOOM,
                    TERRAIN_MODEL.ridgeOffsetX + 12917,
                    TERRAIN_MODEL.ridgeOffsetY - 4813
                )
            );
            const adaptiveThreshold = clamp01(
                RIVER_SOURCE_NOISE_THRESHOLD - (moistureScore * 0.08) - (glacierFactor * 0.1)
            );
            const hasSource =
                downhillNeighborCount >= RIVER_SOURCE_MIN_DOWNHILL_NEIGHBORS &&
                sourceNoise >= adaptiveThreshold;
            riverSourceCache.set(sourceKey, hasSource);
            return hasSource;
        }

        function getRiverSourceWeight(x, y, info) {
            if (!hasLocalRiverSourcePotential(x, y, info)) {
                return 0;
            }
            const moistureScore = clamp01((info.moisture - RIVER_SOURCE_MIN_MOISTURE) / (1 - RIVER_SOURCE_MIN_MOISTURE));
            const elevationScore = clamp01((info.elevation - RIVER_SOURCE_MIN_ELEVATION) / (RIVER_SOURCE_MAX_ELEVATION - RIVER_SOURCE_MIN_ELEVATION));
            const glacierScore = Math.max(
                info.waterIceFactor || 0,
                clamp01((0.42 - info.temperature) / 0.42)
            );
            const glacierBonus = glacierScore >= RIVER_SOURCE_MIN_GLACIER ? glacierScore * 1.3 : glacierScore * 0.5;
            const sourceNoise = normalizeNoise(
                fbmNoise2(
                    x,
                    y,
                    RIVER_SOURCE_NOISE_ZOOM,
                    TERRAIN_MODEL.ridgeOffsetX + 12917,
                    TERRAIN_MODEL.ridgeOffsetY - 4813
                )
            );
            const sourceConcentration = clamp01(
                (sourceNoise - RIVER_SOURCE_NOISE_THRESHOLD) / (1 - RIVER_SOURCE_NOISE_THRESHOLD)
            );
            return 0.9 + (moistureScore * 0.9) + (elevationScore * 1.0) + glacierBonus + (sourceConcentration * 0.7);
        }

        function getFlowDirectionByBit(directionBit) {
            for (const direction of FLOW_DIRECTIONS) {
                if (direction.bit === directionBit) {
                    return direction;
                }
            }
            return null;
        }

        function getRiverFlowDirection(x, y, info) {
            if (!ENABLE_RIVER_OVERLAY || !isRiverLandTile(info)) {
                return 0;
            }
            const key = `${x},${y}`;
            if (riverFlowDirectionCache.has(key)) {
                return riverFlowDirectionCache.get(key);
            }

            let bestDirection = 0;
            let bestSlope = Number.NEGATIVE_INFINITY;
            let bestWaterExitDirection = 0;
            let bestWaterExitScore = Number.NEGATIVE_INFINITY;
            let smallestRise = Number.POSITIVE_INFINITY;
            let spillDirection = 0;
            for (const direction of FLOW_DIRECTIONS) {
                const nx = x + direction.dx;
                const ny = y + direction.dy;
                const neighborInfo = getCachedTerrainInfo(nx, ny);
                const drop = info.elevation - neighborInfo.elevation;
                const slope = drop / direction.length;

                if (isRiverTerminalWaterTile(neighborInfo) && drop >= -RIVER_LAKE_SPILL_MAX_RISE) {
                    const waterExitScore = slope + 0.08;
                    if (waterExitScore > bestWaterExitScore) {
                        bestWaterExitScore = waterExitScore;
                        bestWaterExitDirection = direction.bit;
                    }
                }
                if (drop > RIVER_MIN_FLOW_DROP) {
                    if (slope > bestSlope) {
                        bestSlope = slope;
                        bestDirection = direction.bit;
                    }
                }
                if (drop <= 0 && isRiverLandTile(neighborInfo)) {
                    const rise = -drop;
                    if (rise < smallestRise) {
                        smallestRise = rise;
                        spillDirection = direction.bit;
                    }
                }
            }
            if (bestDirection === 0 && bestWaterExitDirection !== 0) {
                bestDirection = bestWaterExitDirection;
            }
            if (bestDirection === 0 && smallestRise <= RIVER_LAKE_SPILL_MAX_RISE) {
                bestDirection = spillDirection;
            }

            riverFlowDirectionCache.set(key, bestDirection);
            return bestDirection;
        }

        function isRiverTerminalWaterTile(info) {
            return (
                info.zone === "outside" ||
                info.biome === "ocean" ||
                info.biome === "shallow_water" ||
                info.biome === "lake" ||
                info.biome === "coast"
            );
        }

        function isOceanConnectedTerminalWaterTile(info) {
            return (
                info.zone === "outside" ||
                info.biome === "ocean" ||
                info.biome === "shallow_water" ||
                info.oceanConnectedWater === true
            );
        }

        function getRiverFlowAccumulation(x, y, info, visitedKeys = null) {
            if (!ENABLE_RIVER_OVERLAY || !isRiverLandTile(info)) {
                return 0;
            }
            const cacheKey = `${x},${y}`;
            if (!visitedKeys && riverFlowAccumulationCache.has(cacheKey)) {
                return riverFlowAccumulationCache.get(cacheKey);
            }

            const visitSet = visitedKeys || new Set();
            if (visitSet.has(cacheKey)) {
                return 0;
            }
            visitSet.add(cacheKey);

            let accumulation = getRiverSourceWeight(x, y, info);
            for (const direction of FLOW_DIRECTIONS) {
                const nx = x + direction.dx;
                const ny = y + direction.dy;
                const neighborInfo = getCachedTerrainInfo(nx, ny);
                if (!isRiverLandTile(neighborInfo)) {
                    continue;
                }
                const neighborFlowDirection = getRiverFlowDirection(nx, ny, neighborInfo);
                if (neighborFlowDirection !== direction.oppositeBit) {
                    continue;
                }
                const upstreamAccumulation = getRiverFlowAccumulation(nx, ny, neighborInfo, visitSet);
                accumulation += upstreamAccumulation * RIVER_FLOW_ATTENUATION;
            }

            visitSet.delete(cacheKey);
            if (!visitedKeys) {
                riverFlowAccumulationCache.set(cacheKey, accumulation);
            }
            return accumulation;
        }

        function isRiverTileActive(x, y, info) {
            if (!ENABLE_RIVER_OVERLAY || !isRiverLandTile(info)) {
                return false;
            }
            const cacheKey = `${x},${y}`;
            if (riverTileActiveCache.has(cacheKey)) {
                return riverTileActiveCache.get(cacheKey);
            }

            const localSource = hasLocalRiverSourcePotential(x, y, info);
            const flowAccumulation = getRiverFlowAccumulation(x, y, info);
            const isActive = localSource || flowAccumulation >= RIVER_MIN_VISIBLE_FLOW;

            riverTileActiveCache.set(cacheKey, isActive);
            return isActive;
        }

        function getPrimaryIncomingDirection(x, y) {
            let bestIncoming = 0;
            let bestIncomingAccumulation = 0;
            for (const direction of FLOW_DIRECTIONS) {
                const nx = x + direction.dx;
                const ny = y + direction.dy;
                const neighborInfo = getCachedTerrainInfo(nx, ny);
                if (!isRiverLandTile(neighborInfo)) {
                    continue;
                }
                const neighborFlowDirection = getRiverFlowDirection(nx, ny, neighborInfo);
                if (neighborFlowDirection !== direction.oppositeBit) {
                    continue;
                }
                if (!isRiverTileActive(nx, ny, neighborInfo)) {
                    continue;
                }
                const neighborAccumulation = getRiverFlowAccumulation(nx, ny, neighborInfo);
                if (neighborAccumulation > bestIncomingAccumulation) {
                    bestIncomingAccumulation = neighborAccumulation;
                    bestIncoming = direction.bit;
                }
            }
            return bestIncoming;
        }

        function ensureRiverInfo(x, y, info) {
            if (info.riverComputed) {
                return info;
            }

            const flowDirection = getRiverFlowDirection(x, y, info);
            const incomingDirection = getPrimaryIncomingDirection(x, y);
            const isActive = isRiverTileActive(x, y, info);
            const flowAccumulation = getRiverFlowAccumulation(x, y, info);

            let riverMask = 0;
            if (isActive) {
                if (incomingDirection !== 0) {
                    riverMask |= incomingDirection;
                }
                // One river per tile: one outgoing channel direction.
                // It continues until it reaches sea/coast, or stops when all exits are uphill.
                if (flowDirection !== 0) {
                    riverMask |= flowDirection;
                }
            }
            if (riverMask === 0 && incomingDirection !== 0 && isActive) {
                riverMask = incomingDirection;
            }
            if (riverMask === 0 && flowDirection !== 0 && isActive) {
                riverMask |= flowDirection;
            }
            let riverHasLakeBasin = false;
            let riverDeltaCandidate = false;
            if (isActive && flowDirection !== 0) {
                const dir = getFlowDirectionByBit(flowDirection);
                if (dir) {
                    const neighborInfo = getCachedTerrainInfo(x + dir.dx, y + dir.dy);
                    if (isRiverLandTile(neighborInfo)) {
                        riverHasLakeBasin = neighborInfo.elevation >= info.elevation;
                    } else if (
                        isOceanConnectedTerminalWaterTile(neighborInfo) &&
                        flowAccumulation >= RIVER_DELTA_FLOW_THRESHOLD
                    ) {
                        riverDeltaCandidate = true;
                    }
                }
            }
            if (isActive && flowDirection === 0 && incomingDirection !== 0) {
                riverHasLakeBasin = true;
            }

            info.hasRiver = riverMask !== 0;
            info.riverDirectionMask = riverMask;
            info.riverOrientation = getRiverOrientationFromMask(riverMask);
            info.riverFlowWeight = flowAccumulation;
            info.riverThickness = Math.max(0, Math.log2(1 + Math.max(0, flowAccumulation)));
            info.riverOutgoingDirection = flowDirection;
            info.riverIncomingDirection = incomingDirection;
            info.riverHasLakeBasin = riverHasLakeBasin;
            info.riverDeltaCandidate = riverDeltaCandidate;
            info.riverComputed = true;
            return info;
        }

        function pickBiome(temperature, moisture, finalElevation, ridge) {
            // Name biome from final (post-ridge) elevation first, then climate.
            if (finalElevation > 0.86) return "mountaintop";
            if (finalElevation > 0.76) return ridge > 0.65 ? "alpine" : "mountain";
            if (finalElevation > 0.66 && temperature < 0.35) return "alpine_tundra";

            if (temperature < 0.20) return (moisture < 0.45 ? "tundra" : "snow");
            if (temperature < 0.35) return (moisture < 0.35 ? "tundra" : "taiga");
            if (temperature < 0.55) {
                if (moisture < 0.25) return "shrubland";
                if (moisture < 0.55) return "grassland";
                return "temperate_forest";
            }
            if (moisture < 0.18) return "desert";
            if (moisture < 0.42) return "plains";
            if (moisture < 0.72) return "forest";
            return "rainforest";
        }

        function biomeToTerrain(biome) {
            // Keep terrain names aligned with biome names unless a remap is required.
            switch (biome) {
                case "desert":
                case "plains":
                case "grassland":
                case "shrubland":
                case "temperate_forest":
                case "rainforest":
                case "taiga":
                case "forest":
                case "tundra":
                case "mountain":
                case "alpine":
                case "alpine_tundra":
                case "mountaintop":
                case "snow":
                    return biome;
                default:
                    return "grassland";
            }
        }

        function isInsideMap(x, y) {
            return x >= MAP_X_MIN && x <= MAP_X_MAX && y >= MAP_Y_MIN && y <= MAP_Y_MAX;
        }

        function createTerrainInfoFromSample(baseSample, terrain, biome, waterBodyType, oceanConnectedWater) {
            return {
                terrain: terrain,
                biome: biome,
                elevation: baseSample.elevation,
                moisture: baseSample.moisture,
                temperature: baseSample.temperature,
                ridge: baseSample.ridge,
                oceanIceFactor: baseSample.oceanIceFactor,
                waterIceFactor: baseSample.waterIceFactor,
                zone: baseSample.zone,
                waterBodyType: waterBodyType,
                oceanConnectedWater: !!oceanConnectedWater,
                hasRiver: false,
                riverDirectionMask: 0,
                riverOrientation: "none",
                riverFlowWeight: 0,
                riverThickness: 0,
                riverIncomingDirection: 0,
                riverOutgoingDirection: 0,
                riverHasLakeBasin: false,
                riverDeltaCandidate: false,
                riverComputed: false
            };
        }

        function getBaseTerrainSample(x, y) {
            const baseKey = `${x},${y}`;
            if (terrainBaseCache.has(baseKey)) {
                return terrainBaseCache.get(baseKey);
            }

            // [Item 1] Base terrain signals (Red Blob style): compute independent elevation/moisture noise fields.
            let elevation = normalizeNoise(
                fbmNoise2(x, y, NOISE_ZOOM, TERRAIN_MODEL.elevationOffsetX, TERRAIN_MODEL.elevationOffsetY)
            );
            let moisture = normalizeNoise(
                fbmNoise2(x, y, NOISE_ZOOM * 1.4, TERRAIN_MODEL.moistureOffsetX, TERRAIN_MODEL.moistureOffsetY)
            );

            // [Item 2] Redistribute base noise to control global land/water and biome proportions.
            elevation = Math.pow(elevation, TERRAIN_MODEL.elevationExponent);
            moisture = Math.pow(moisture, TERRAIN_MODEL.moistureExponent);
            moisture = clamp01(moisture * moistureMultiplier);

            // [Item 3] Replace hard rectangular edge tiles with center-distance island shaping.
            const centerX = (MAP_X_MIN + MAP_X_MAX) * 0.5;
            const centerY = (MAP_Y_MIN + MAP_Y_MAX) * 0.5;
            const halfWidth = (MAP_X_MAX - MAP_X_MIN) * 0.5;
            const halfHeight = (MAP_Y_MAX - MAP_Y_MIN) * 0.5;
            const nx = (x - centerX) / halfWidth;
            const ny = (y - centerY) / halfHeight;
            let centerDistance = Math.sqrt((nx * nx) + (ny * ny));
            centerDistance = clamp01(Math.pow(centerDistance, TERRAIN_MODEL.islandDistancePower));

            // [Item 4] Add low-frequency coastline jitter so borders are irregular, not perfectly geometric.
            const coastNoise = normalizeNoise(
                fbmNoise2(
                    x,
                    y,
                    NOISE_ZOOM * TERRAIN_MODEL.islandCoastNoiseZoom,
                    TERRAIN_MODEL.coastOffsetX,
                    TERRAIN_MODEL.coastOffsetY
                )
            );
            const islandMixValue = clamp01(0.20 + (islandShapeMultiplier * 0.70)); // 50% -> 0.55 baseline
            const islandJitterValue = 0.06 + (islandShapeMultiplier * 0.24); // 50% -> 0.18 baseline
            centerDistance = clamp01(centerDistance + ((coastNoise - 0.5) * islandJitterValue));

            // [Item 5] Blend in an island target (1 - distance), but only as a lowering pass.
            const islandTargetElevation = 1 - centerDistance;
            const islandLoweredElevation = Math.min(elevation, islandTargetElevation);
            elevation = clamp01(
                (elevation * (1 - islandMixValue)) +
                (islandLoweredElevation * islandMixValue)
            );

            // [Item 6] Regional mountain/water shaping on top of island-form elevation.
            const mountainness = normalizeNoise(
                fbmNoise2(
                    x,
                    y,
                    NOISE_ZOOM * TERRAIN_MODEL.mountainRegionZoom,
                    TERRAIN_MODEL.mountainnessOffsetX,
                    TERRAIN_MODEL.mountainnessOffsetY
                )
            );
            const mountainThreshold0 = clamp01(
                TERRAIN_MODEL.mountainRegionThreshold0 + ((0.5 - mountainMultiplier) * 0.24)
            );
            const mountainThreshold1 = clamp01(
                TERRAIN_MODEL.mountainRegionThreshold1 + ((0.5 - mountainMultiplier) * 0.28)
            );
            const mountainRegion = smoothstep(
                mountainThreshold0,
                mountainThreshold1,
                mountainness
            );
            const mountainProfile = Math.pow(mountainRegion, TERRAIN_MODEL.mountainRegionProfilePower);
            const lowlandDepth = 1 - smoothstep(0.22, 0.45, elevation); // strongest sink on already-low terrain
            const mountainBaseline =
                TERRAIN_MODEL.mountainBaseEdge +
                (TERRAIN_MODEL.mountainBaseCore - TERRAIN_MODEL.mountainBaseEdge) * mountainProfile;
            const mountainStrength = 0.2 + (mountainMultiplier * 1.6); // 0..100% maps to 0.2..1.8
            const mountainEdgeGate = 1 - smoothstep(
                TERRAIN_MODEL.coastalMountainSuppressionStart,
                1,
                centerDistance
            );
            const mountainBlend = clamp01(
                mountainRegion * TERRAIN_MODEL.mountainBlendStrength * mountainStrength * mountainEdgeGate
            );
            elevation = clamp01((elevation * (1 - mountainBlend)) + (mountainBaseline * mountainBlend));

            // Use inverse mountainness to carve coherent lowland/water basins.
            const waterThreshold0 = clamp01(1 - mountainThreshold1);
            const waterThreshold1 = clamp01(1 - mountainThreshold0);
            const waterRegion = smoothstep(
                waterThreshold0,
                waterThreshold1,
                1 - mountainness
            );
            const waterProfile = Math.pow(waterRegion, TERRAIN_MODEL.waterRegionProfilePower);
            const waterBaseline =
                TERRAIN_MODEL.waterBaseEdge +
                (TERRAIN_MODEL.waterBaseCore - TERRAIN_MODEL.waterBaseEdge) * waterProfile;
            const waterLowlandGate = 1 - smoothstep(0.38, 0.60, elevation);
            const waterBlend = clamp01(waterRegion * TERRAIN_MODEL.waterBlendStrength * waterLowlandGate);
            elevation = clamp01((elevation * (1 - waterBlend)) + (waterBaseline * waterBlend));

            elevation = clamp01(elevation - (lowlandDepth * TERRAIN_MODEL.lowlandSinkStrength * (1 - mountainRegion)));

            // Final coastline sink to ensure stronger rolloff near map boundaries.
            const coastalSink = smoothstep(TERRAIN_MODEL.coastalSinkStart, 1, centerDistance);
            const coastalSinkScale = 0.35 + (islandShapeMultiplier * 1.25);
            elevation = clamp01(elevation - (coastalSink * TERRAIN_MODEL.coastalSinkStrength * coastalSinkScale));

            // [Change 6] Temperature proxy: latitude + elevation cooling.
            const lat01 = (y - MAP_Y_MIN) / (MAP_Y_MAX - MAP_Y_MIN); // 0 north .. 1 south
            const equatorDistance = Math.abs(lat01 - 0.5) * 2; // 0 equator .. 1 poles
            const baseTemperature = 1 - (equatorDistance * 0.85);
            const temperature = clamp01(baseTemperature - (elevation * 0.45));
            const iceTransitionNoise = normalizeNoise(
                fbmNoise2(x, y, NOISE_ZOOM * 18, TERRAIN_MODEL.coastOffsetX + 9503, TERRAIN_MODEL.coastOffsetY - 4711)
            );
            const localIceTemp = clamp01(temperature + ((iceTransitionNoise - 0.5) * ICE_TRANSITION_NOISE_STRENGTH));
            const oceanIceFactor = 1 - smoothstep(
                OCEAN_ICE_TEMPERATURE_START,
                OCEAN_ICE_TEMPERATURE_END,
                localIceTemp
            );
            const waterIceFactor = 1 - smoothstep(
                WATER_ICE_TEMPERATURE_START,
                WATER_ICE_TEMPERATURE_END,
                localIceTemp
            );

            // [Change 7] Coast and mountain refinement with separate ridge signal.
            const ridge = ridgedNoise2(x, y, NOISE_ZOOM * 0.9, TERRAIN_MODEL.ridgeOffsetX, TERRAIN_MODEL.ridgeOffsetY);
            const mountainBoost = smoothstep(0.58, 0.88, elevation) * smoothstep(0.55, 0.82, ridge);
            const elevated = clamp01(elevation + mountainBoost * 0.25);
            const biome = pickBiome(temperature, moisture, elevated, ridge);
            const terrain = biomeToTerrain(biome);

            const sample = {
                zone: "inland",
                elevation: elevated,
                moisture: moisture,
                temperature: temperature,
                ridge: ridge,
                oceanIceFactor: oceanIceFactor,
                waterIceFactor: waterIceFactor,
                landBiome: biome,
                landTerrain: terrain,
                isDeepWaterCandidate: elevated < BASE_OCEAN_ELEVATION,
                isWaterCandidate: elevated < BASE_WATER_ELEVATION,
                isCoastCandidate: elevated < BASE_COAST_ELEVATION
            };
            terrainBaseCache.set(baseKey, sample);
            return sample;
        }

        function isWaterCandidateSample(sample) {
            return sample.zone === "inland" && sample.isWaterCandidate;
        }

        function isWaterConnectedToOcean(startX, startY) {
            if (!isInsideMap(startX, startY)) {
                return true;
            }
            const startKey = `${startX},${startY}`;
            if (oceanConnectivityCache.has(startKey)) {
                return oceanConnectivityCache.get(startKey);
            }

            const startSample = getBaseTerrainSample(startX, startY);
            if (!isWaterCandidateSample(startSample)) {
                oceanConnectivityCache.set(startKey, false);
                return false;
            }

            const queue = [{ x: startX, y: startY }];
            const localVisited = new Set([startKey]);
            const localVisitedKeys = [];
            let queueIndex = 0;
            let connectedToOcean = false;
            let resolvedByCache = false;

            while (queueIndex < queue.length) {
                const node = queue[queueIndex];
                queueIndex += 1;
                const nodeKey = `${node.x},${node.y}`;
                localVisitedKeys.push(nodeKey);

                if (oceanConnectivityCache.has(nodeKey)) {
                    connectedToOcean = oceanConnectivityCache.get(nodeKey);
                    resolvedByCache = true;
                    break;
                }

                for (const direction of FLOW_DIRECTIONS) {
                    const nx = node.x + direction.dx;
                    const ny = node.y + direction.dy;
                    if (!isInsideMap(nx, ny)) {
                        connectedToOcean = true;
                        resolvedByCache = true;
                        break;
                    }
                    const neighborKey = `${nx},${ny}`;
                    if (localVisited.has(neighborKey)) {
                        continue;
                    }
                    const neighborSample = getBaseTerrainSample(nx, ny);
                    if (!isWaterCandidateSample(neighborSample)) {
                        continue;
                    }
                    localVisited.add(neighborKey);
                    queue.push({ x: nx, y: ny });
                    if (queue.length > OCEAN_CONNECTIVITY_MAX_NODES) {
                        connectedToOcean = true;
                        resolvedByCache = true;
                        break;
                    }
                }
                if (resolvedByCache) {
                    break;
                }
            }

            for (const key of localVisitedKeys) {
                oceanConnectivityCache.set(key, connectedToOcean);
            }
            oceanConnectivityCache.set(startKey, connectedToOcean);
            return connectedToOcean;
        }

        function hasAdjacentSurfaceWater(x, y) {
            for (const direction of FLOW_DIRECTIONS) {
                const nx = x + direction.dx;
                const ny = y + direction.dy;
                if (!isInsideMap(nx, ny)) {
                    return true;
                }
                const neighborSample = getBaseTerrainSample(nx, ny);
                if (isWaterCandidateSample(neighborSample)) {
                    return true;
                }
            }
            return false;
        }

        function isAdjacentToOceanConnectedWater(x, y) {
            for (const direction of FLOW_DIRECTIONS) {
                const nx = x + direction.dx;
                const ny = y + direction.dy;
                if (!isInsideMap(nx, ny)) {
                    return true;
                }
                const neighborSample = getBaseTerrainSample(nx, ny);
                if (!isWaterCandidateSample(neighborSample)) {
                    continue;
                }
                if (isWaterConnectedToOcean(nx, ny)) {
                    return true;
                }
            }
            return false;
        }

        function getTerrainInfo(x, y) {
            if (!isInsideMap(x, y)) {
                return {
                    terrain: "ocean",
                    biome: "ocean",
                    elevation: 0,
                    moisture: 0,
                    temperature: 0,
                    ridge: 0,
                    oceanIceFactor: 0,
                    waterIceFactor: 0,
                    zone: "outside",
                    waterBodyType: "ocean",
                    oceanConnectedWater: true,
                    hasRiver: false,
                    riverDirectionMask: 0,
                    riverOrientation: "none",
                    riverFlowWeight: 0,
                    riverThickness: 0,
                    riverIncomingDirection: 0,
                    riverOutgoingDirection: 0,
                    riverHasLakeBasin: false,
                    riverDeltaCandidate: false,
                    riverComputed: true
                };
            }

            const baseSample = getBaseTerrainSample(x, y);
            if (baseSample.isWaterCandidate) {
                const oceanConnected = isWaterConnectedToOcean(x, y);
                if (oceanConnected) {
                    if (baseSample.isDeepWaterCandidate) {
                        return createTerrainInfoFromSample(baseSample, "ocean", "ocean", "ocean", true);
                    }
                    return createTerrainInfoFromSample(baseSample, "water", "shallow_water", "sea", true);
                }
                return createTerrainInfoFromSample(baseSample, "water", "lake", "lake", false);
            }

            if (baseSample.isCoastCandidate && hasAdjacentSurfaceWater(x, y)) {
                const oceanConnected = isAdjacentToOceanConnectedWater(x, y);
                return createTerrainInfoFromSample(baseSample, "beach", "coast", "coast", oceanConnected);
            }

            return createTerrainInfoFromSample(
                baseSample,
                baseSample.landTerrain,
                baseSample.landBiome,
                "none",
                false
            );
        }

        // [Change 8] Determinism note:
        // We keep one global noise seed and derive independent fields through fixed coordinate offsets.
        // This keeps map generation stable/reproducible while allowing multiple pseudo-independent signals.

        function getCachedTerrainInfo(x, y) {
            const cacheKey = `${x},${y}`;
            if (USE_TERRAIN_CACHE && terrainCache.has(cacheKey)) {
                return terrainCache.get(cacheKey);
            }

            const info = getTerrainInfo(x, y);
            if (USE_TERRAIN_CACHE) {
                terrainCache.set(cacheKey, info);
            }
            return info;
        }

        function generateTerrain(x, y) {
            return getCachedTerrainInfo(x, y).terrain;
        }

        function classifyTemperatureBand(temperature01) {
            if (temperature01 < 0.33) return "cold";
            if (temperature01 < 0.66) return "temperate";
            return "hot";
        }

        function classifyMoistureBand(moisture01) {
            if (moisture01 < 0.33) return "dry";
            if (moisture01 < 0.66) return "normal";
            return "wet";
        }

        function getTerrainTextureVariant(info) {
            // Water/coast currently render with flat colors.
            if (info.biome === "ocean" || info.biome === "shallow_water" || info.biome === "lake" || info.biome === "coast") {
                return null;
            }

            const temperatureBand = classifyTemperatureBand(info.temperature);
            const moistureBand = classifyMoistureBand(info.moisture);
            const textureBiome = info.biome === "mountaintop" ? "snow" : info.biome;
            return `${textureBiome}_${temperatureBand}_${moistureBand}`;
        }

        function getTerrainPattern(info, targetContext = context) {
            if (!USE_TERRAIN_TEXTURES) {
                return null;
            }

            const variant = getTerrainTextureVariant(info);
            if (!variant) {
                return null;
            }
            if (terrainPatternCache.has(variant)) {
                return terrainPatternCache.get(variant);
            }
            const knownLoadState = terrainPatternLoadState.get(variant);
            if (knownLoadState === "loading" || knownLoadState === "missing") {
                return null;
            }

            terrainPatternLoadState.set(variant, "loading");
            const img = new Image();
            img.onload = () => {
                const pattern = targetContext.createPattern(img, "repeat");
                if (pattern) {
                    terrainPatternCache.set(variant, pattern);
                    terrainPatternLoadState.set(variant, "ready");
                    redraw(currentTransform);
                } else {
                    terrainPatternLoadState.set(variant, "missing");
                }
            };
            img.onerror = () => {
                terrainPatternLoadState.set(variant, "missing");
            };
            img.src = `${TERRAIN_TEXTURE_ROOT}/${variant}.png`;
            return null;
        }

        // Function for turning a terrain tile into graphical output
        // At his point we assume the x and y are the top-left corner of the tile, and the size is the size of the tile.
        // Also, the coordinates are already transformed by the zoom level and translation.
        // Note that the tile may be partially visible, so you may need to draw a partial tile.
        function drawRiverOverlay(info, x0, y0, drawW, drawH, size, targetContext) {
            if (!info.hasRiver || size < RIVER_MIN_DRAW_PIXEL_SIZE) {
                return;
            }

            const riverColor = (useIceColorBlending && info.temperature < WATER_ICE_TEMPERATURE_END)
                ? mixHexColors(RIVER_COLOR, RIVER_ICE_COLOR, clamp01((WATER_ICE_TEMPERATURE_END - info.temperature) / 0.24))
                : RIVER_COLOR;
            const mask = info.riverDirectionMask;
            const cx = x0 + (drawW * 0.5);
            const cy = y0 + (drawH * 0.5);
            const northY = y0;
            const southY = y0 + drawH;
            const westX = x0;
            const eastX = x0 + drawW;
            const thickness = Math.max(0, info.riverThickness || 0);
            const widthFactor = RIVER_LINE_WIDTH_FACTOR + (thickness * 0.08);
            const lineWidth = Math.max(1, size * widthFactor);

            targetContext.strokeStyle = riverColor;
            targetContext.lineWidth = lineWidth;
            targetContext.lineCap = "round";
            targetContext.lineJoin = "round";

            if (mask & RIVER_DIR_NORTH) {
                targetContext.beginPath();
                targetContext.moveTo(cx, cy);
                targetContext.lineTo(cx, northY);
                targetContext.stroke();
            }
            if (mask & RIVER_DIR_EAST) {
                targetContext.beginPath();
                targetContext.moveTo(cx, cy);
                targetContext.lineTo(eastX, cy);
                targetContext.stroke();
            }
            if (mask & RIVER_DIR_SOUTH) {
                targetContext.beginPath();
                targetContext.moveTo(cx, cy);
                targetContext.lineTo(cx, southY);
                targetContext.stroke();
            }
            if (mask & RIVER_DIR_WEST) {
                targetContext.beginPath();
                targetContext.moveTo(cx, cy);
                targetContext.lineTo(westX, cy);
                targetContext.stroke();
            }
            if (mask & RIVER_DIR_NORTHEAST) {
                targetContext.beginPath();
                targetContext.moveTo(cx, cy);
                targetContext.lineTo(eastX, northY);
                targetContext.stroke();
            }
            if (mask & RIVER_DIR_SOUTHEAST) {
                targetContext.beginPath();
                targetContext.moveTo(cx, cy);
                targetContext.lineTo(eastX, southY);
                targetContext.stroke();
            }
            if (mask & RIVER_DIR_SOUTHWEST) {
                targetContext.beginPath();
                targetContext.moveTo(cx, cy);
                targetContext.lineTo(westX, southY);
                targetContext.stroke();
            }
            if (mask & RIVER_DIR_NORTHWEST) {
                targetContext.beginPath();
                targetContext.moveTo(cx, cy);
                targetContext.lineTo(westX, northY);
                targetContext.stroke();
            }
            if (info.riverHasLakeBasin) {
                targetContext.fillStyle = riverColor;
                targetContext.beginPath();
                targetContext.arc(cx, cy, Math.max(1.2, lineWidth * 0.75), 0, Math.PI * 2);
                targetContext.fill();
            }
            if (info.riverDeltaCandidate) {
                targetContext.fillStyle = riverColor;
                targetContext.globalAlpha = 0.55;
                targetContext.beginPath();
                targetContext.arc(cx, cy, Math.max(1.5, lineWidth * 1.25), 0, Math.PI * 2);
                targetContext.fill();
                targetContext.globalAlpha = 1;
            }
        }

        function drawPathPreviewOverlay(info, tileX, tileY, x0, y0, drawW, drawH, targetContext) {
            if (!ENABLE_OCEAN_MOUNTAIN_PATH_PREVIEW) {
                return;
            }
            if (!PATH_PREVIEW_DRAW_OVER_WATER && isPathPreviewWaterTile(info)) {
                return;
            }
            if (pathPreviewOceanReplacementTileCache.has(`${tileX},${tileY}`)) {
                return;
            }
            if (!pathPreviewTileCache.has(`${tileX},${tileY}`)) {
                return;
            }
            targetContext.fillStyle = PATH_PREVIEW_COLOR;
            targetContext.fillRect(x0, y0, drawW, drawH);
        }

        function drawPathOceanReplacementOverlay(info, tileX, tileY, x0, y0, drawW, drawH, targetContext) {
            if (!ENABLE_OCEAN_MOUNTAIN_PATH_PREVIEW) {
                return;
            }
            if (!pathPreviewOceanReplacementTileCache.has(`${tileX},${tileY}`)) {
                return;
            }
            if (useIceColorBlending && info.oceanIceFactor > 0.01) {
                targetContext.fillStyle = mixHexColors(TERRAIN_COLORS.ocean, TERRAIN_COLORS.ocean_ice, info.oceanIceFactor);
            } else {
                targetContext.fillStyle = TERRAIN_COLORS.ocean;
            }
            targetContext.fillRect(x0, y0, drawW, drawH);
        }

        function drawTile(info, x, y, size, targetContext = context, tileX = null, tileY = null) {
            // Snap to device pixels to prevent anti-aliased seams between adjacent tiles.
            const x0 = Math.floor(x);
            const y0 = Math.floor(y);
            const x1 = Math.ceil(x + size);
            const y1 = Math.ceil(y + size);
            const drawW = Math.max(1, x1 - x0);
            const drawH = Math.max(1, y1 - y0);
            // Below 3 px, textures lose detail and cost more than they add; use flat color fallback.
            const pattern = (size >= MIN_TEXTURE_TILE_PIXEL_SIZE) ? getTerrainPattern(info, targetContext) : null;
            if (pattern) {
                targetContext.fillStyle = pattern;
                targetContext.fillRect(x0, y0, drawW, drawH);
                if (tileX !== null && tileY !== null) {
                    drawPathOceanReplacementOverlay(info, tileX, tileY, x0, y0, drawW, drawH, targetContext);
                    drawPathPreviewOverlay(info, tileX, tileY, x0, y0, drawW, drawH, targetContext);
                }
                return;
            }

            const terrain = info.terrain;
            switch (terrain) {
                case "ocean":
                    if (useIceColorBlending && info.oceanIceFactor > 0.01) {
                        targetContext.fillStyle = mixHexColors(TERRAIN_COLORS.ocean, TERRAIN_COLORS.ocean_ice, info.oceanIceFactor);
                    } else {
                        targetContext.fillStyle = USE_RANDOM_WATER_COLOR
                            ? `rgba(30, 125, ${Math.floor(128 + Math.random() * 72)}, 1)`
                            : TERRAIN_COLORS.ocean;
                    }
                    break;
                case "water":
                    if (useIceColorBlending && info.waterIceFactor > 0.01) {
                        const openWaterColor = info.biome === "lake" ? TERRAIN_COLORS.lake : TERRAIN_COLORS.water;
                        targetContext.fillStyle = mixHexColors(openWaterColor, TERRAIN_COLORS.water_ice, info.waterIceFactor);
                    } else {
                        targetContext.fillStyle = USE_RANDOM_WATER_COLOR
                            ? `rgba(30, 125, ${Math.floor(200 + Math.random() * 55)}, 1)`
                            : (info.biome === "lake" ? TERRAIN_COLORS.lake : TERRAIN_COLORS.water);
                    }
                    break;
                default:
                    targetContext.fillStyle = TERRAIN_COLORS[terrain] || "#ff00ff";
            }
            targetContext.fillRect(x0, y0, drawW, drawH);
            if (tileX !== null && tileY !== null) {
                drawPathOceanReplacementOverlay(info, tileX, tileY, x0, y0, drawW, drawH, targetContext);
                drawPathPreviewOverlay(info, tileX, tileY, x0, y0, drawW, drawH, targetContext);
            }
        }

        // Compute visible world tile range directly from transform (no player-position projection).
        function computeTiles(transform) {
            const k = transform.k;
            const tilePx = TILE_SIZE * k;
            const x0 = Math.floor((0 - transform.x) / tilePx) - 1;
            const x1 = Math.floor((canvas.width - transform.x) / tilePx) + 2;
            const y0 = Math.floor((0 - transform.y) / tilePx) - 1;
            const y1 = Math.floor((canvas.height - transform.y) / tilePx) + 2;

            const tiles = [];
            for (let x = x0; x < x1; x += 1) {
                const xpos = x * tilePx + transform.x;
                for (let y = y0; y < y1; y += 1) {
                    const ypos = y * tilePx + transform.y;
                    const info = getCachedTerrainInfo(x, y);
                    tiles.push({ info: info, x: xpos, y: ypos, size: tilePx, tileX: x, tileY: y });
                }
            }
            return tiles;
        }

        function createCloudSprite(size) {
            const sprite = document.createElement("canvas");
            sprite.width = size;
            sprite.height = size;
            const spriteCtx = sprite.getContext("2d");
            const center = size * 0.5;
            const cloudSeed = Math.random();

            for (let i = 0; i < 5; i += 1) {
                const radius = (size * (0.18 + (Math.random() * 0.14)));
                const angle = ((Math.PI * 2) * (i / 5)) + (cloudSeed * Math.PI);
                const distance = size * (0.06 + (Math.random() * 0.15));
                const px = center + (Math.cos(angle) * distance);
                const py = center + (Math.sin(angle) * distance * 0.7);
                const gradient = spriteCtx.createRadialGradient(px, py, radius * 0.2, px, py, radius);
                gradient.addColorStop(0, "rgba(255,255,255,0.90)");
                gradient.addColorStop(0.55, "rgba(255,255,255,0.45)");
                gradient.addColorStop(1, "rgba(255,255,255,0)");
                spriteCtx.fillStyle = gradient;
                spriteCtx.beginPath();
                spriteCtx.arc(px, py, radius, 0, Math.PI * 2);
                spriteCtx.fill();
            }

            const broad = spriteCtx.createRadialGradient(center, center, size * 0.08, center, center, size * 0.5);
            broad.addColorStop(0, "rgba(255,255,255,0.38)");
            broad.addColorStop(1, "rgba(255,255,255,0)");
            spriteCtx.fillStyle = broad;
            spriteCtx.fillRect(0, 0, size, size);
            return sprite;
        }

        function initializeCloudSprites() {
            if (!ENABLE_PROCEDURAL_CLOUDS) {
                return;
            }
            cloudSprites.length = 0;
            const worldWidth = (MAP_X_MAX - MAP_X_MIN + 1);
            const worldHeight = (MAP_Y_MAX - MAP_Y_MIN + 1);
            for (let i = 0; i < CLOUD_COUNT; i += 1) {
                const radiusTiles =
                    CLOUD_RADIUS_MIN_TILES +
                    (Math.random() * (CLOUD_RADIUS_MAX_TILES - CLOUD_RADIUS_MIN_TILES));
                const speedX =
                    CLOUD_SPEED_MIN_TILES_PER_SEC +
                    (Math.random() * (CLOUD_SPEED_MAX_TILES_PER_SEC - CLOUD_SPEED_MIN_TILES_PER_SEC));
                const speedY = (Math.random() - 0.5) * 0.9;
                cloudSprites.push({
                    worldX: MAP_X_MIN + (Math.random() * worldWidth),
                    worldY: MAP_Y_MIN + (Math.random() * worldHeight),
                    radiusTiles: radiusTiles,
                    speedX: speedX,
                    speedY: speedY,
                    opacity: 0.35 + (Math.random() * 0.45),
                    sprite: createCloudSprite(CLOUD_SPRITE_SIZE)
                });
            }
        }

        function drawCloudOverlay(transform) {
            if (!ENABLE_PROCEDURAL_CLOUDS || cloudDensityMultiplier <= 0.01) {
                return;
            }

            const tilePx = TILE_SIZE * transform.k;
            const worldWidth = (MAP_X_MAX - MAP_X_MIN + 1);
            const worldHeight = (MAP_Y_MAX - MAP_Y_MIN + 1);
            const activeCount = Math.max(
                1,
                Math.min(
                    cloudSprites.length,
                    Math.round(cloudSprites.length * (0.2 + (cloudDensityMultiplier * 0.8)))
                )
            );
            const wrapPadding = 300;

            for (let i = 0; i < activeCount; i += 1) {
                const cloud = cloudSprites[i];
                const wrappedX = MAP_X_MIN + (((cloud.worldX - MAP_X_MIN) % worldWidth) + worldWidth) % worldWidth;
                const wrappedY = MAP_Y_MIN + (((cloud.worldY - MAP_Y_MIN) % worldHeight) + worldHeight) % worldHeight;
                const radiusPx = cloud.radiusTiles * tilePx;
                const sizePx = radiusPx * 2;
                const sx = (wrappedX * tilePx) + transform.x - radiusPx;
                const sy = (wrappedY * tilePx) + transform.y - radiusPx;

                if (sx > canvas.width + wrapPadding || sy > canvas.height + wrapPadding || sx + sizePx < -wrapPadding || sy + sizePx < -wrapPadding) {
                    continue;
                }

                context.globalAlpha = Math.min(1, cloud.opacity * cloudDensityMultiplier * CLOUD_MAX_OPACITY);
                context.drawImage(cloud.sprite, sx, sy, sizePx, sizePx);
            }
            context.globalAlpha = 1;
        }

        function renderTerrainLayer(transform) {
            if (!terrainLayerCanvas || !terrainLayerContext) {
                return;
            }
            ensurePathPreviewTiles();

            terrainLayerContext.clearRect(0, 0, terrainLayerCanvas.width, terrainLayerCanvas.height);

            if (!USE_ALLOCATION_FREE_REDRAW) {
                const tiles = computeTiles(transform);
                tiles.forEach(tile => {
                    drawTile(tile.info, tile.x, tile.y, tile.size, terrainLayerContext, tile.tileX, tile.tileY);
                });
                return;
            }

            const k = transform.k;
            const tilePx = TILE_SIZE * k;
            const x0 = Math.floor((0 - transform.x) / tilePx) - 1;
            const x1 = Math.floor((canvas.width - transform.x) / tilePx) + 2;
            const y0 = Math.floor((0 - transform.y) / tilePx) - 1;
            const y1 = Math.floor((canvas.height - transform.y) / tilePx) + 2;

            for (let x = x0; x < x1; x += 1) {
                const xpos = x * tilePx + transform.x;
                for (let y = y0; y < y1; y += 1) {
                    const ypos = y * tilePx + transform.y;
                    const info = getCachedTerrainInfo(x, y);
                    drawTile(info, xpos, ypos, tilePx, terrainLayerContext, x, y);
                }
            }
        }

        function drawRiverOverlayLayer(transform, targetContext) {
            if (!ENABLE_RIVER_OVERLAY) {
                return;
            }
            const k = transform.k;
            const tilePx = TILE_SIZE * k;
            const x0 = Math.floor((0 - transform.x) / tilePx) - 1;
            const x1 = Math.floor((canvas.width - transform.x) / tilePx) + 2;
            const y0 = Math.floor((0 - transform.y) / tilePx) - 1;
            const y1 = Math.floor((canvas.height - transform.y) / tilePx) + 2;

            for (let x = x0; x < x1; x += 1) {
                const xpos = x * tilePx + transform.x;
                for (let y = y0; y < y1; y += 1) {
                    const ypos = y * tilePx + transform.y;
                    const info = getCachedTerrainInfo(x, y);
                    if (!isRiverLandTile(info)) {
                        continue;
                    }
                    ensureRiverInfo(x, y, info);
                    drawRiverOverlay(info, xpos, ypos, tilePx, tilePx, tilePx, targetContext);
                }
            }
        }

        function composeFrame(transform) {
            const frameStart = performance.now();
            if (!terrainLayerCanvas) {
                return;
            }
            context.clearRect(0, 0, canvas.width, canvas.height);
            context.drawImage(terrainLayerCanvas, 0, 0);
            drawRiverOverlayLayer(transform, context);
            drawCloudOverlay(transform);
            const renderMs = performance.now() - frameStart;
            renderMsEma = (renderMsEma === 0) ? renderMs : ((renderMsEma * 0.85) + (renderMs * 0.15));
            perfPanel.text(`Render: ${renderMsEma.toFixed(2)} ms`);
        }

        // Redraw terrain layer only when world/camera changed; clouds animate on top separately.
        function redraw(transform) {
            const redrawStart = performance.now();
            renderTerrainLayer(transform);
            composeFrame(transform);
            const totalMs = performance.now() - redrawStart;
            const totalMsEma = (renderMsEma * 0.6) + (totalMs * 0.4);
            perfPanel.text(`Render: ${totalMsEma.toFixed(2)} ms`);
        }


        //////////////////////////////////////////////////////////////////////////////////////////////////////////////////// 
        // Create canvas

        // Noise.js setup

        initializeCloudSprites();
