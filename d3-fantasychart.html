<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy Map</title>
    <link rel="stylesheet" href="d3-fantasychart.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="include/perlin.js"></script>
    <script src="include/world-terrain-ranges.js"></script>
</head>
<body>
    <script>
        //////////////////////////////////////////////////////////////////////////////////////////////////////////////////// 
        // Description
        //////////////////////////////////////////////////////////////////////////////////////////////////////////////////// 
        //
        // Intent: Create a fantasy map using Perlin noise.
        //  
        // The map will consist of different terrains: water, beach, grassland, forest, mountain, and snow.
        // The map will be generated using Perlin noise, with the terrain type determined by the noise value.
        // The map will be *finite* in size, with the player starting at the center of the map.
        // The edge of the map will be at x = 0, y = 0 and player_starting_position_x*2, player_starting_position_y*2 respectively.
        // Once you reach the edge, the terrain will turn into beach (1 tile at the edge),
        // then water for negative x or y values, or for values larger than 2*player_x or 2*player_y.
        // 
        // At the start, the player is at the center of the map.
        // The player will be able to move around the map by pressing the WASD keys.
        // The player will not be able to move into the water.
        // The player will be able to move into the beach, but only if the player is moving away from the water.
        // The player will be able to move into the grassland, forest, mountain, and snow.
        // The player will not be able to move off the map.

        //////////////////////////////////////////////////////////////////////////////////////////////////////////////////// 
        // Settings
        //////////////////////////////////////////////////////////////////////////////////////////////////////////////////// 

        // Tile settings
        const TILE_SIZE = 8;         // Size of tile in pixels
        const MOVE_AMOUNT = TILE_SIZE; // Nr of pixels to move when a key is pressed
        const NOISE_ZOOM = 10;       // Zoom level for the noise function. Higher zoom gives less variation in terrain.
        const USE_TERRAIN_CACHE = true; // Toggle terrain cache for performance testing
        const USE_RANDOM_WATER_COLOR = false; // Toggle random water/ocean shading
        const USE_ALLOCATION_FREE_REDRAW = true; // Toggle draw path that avoids per-frame tile-object allocation
        const USE_TERRAIN_TEXTURES = true; // Render selected terrains with image-like texture patterns
        const TERRAIN_TEXTURE_ROOT = "textures"; // Folder with generated biome texture PNG files
        // Background music attribution:
        // Artist: MaxKoMusic
        // Source: https://www.newgrounds.com/audio/listen/1428973
        const BACKGROUND_MUSIC_URL = "music/1428973_Magical-Forest.mp3";
        const DEFAULT_BACKGROUND_MUSIC_VOLUME = 0.35;
        let moistureMultiplier = 0.5; // Global moisture tuning from UI slider
        let mountainMultiplier = 0.5; // Global mountain tuning from UI slider (coverage + intensity)
        let islandShapeMultiplier = 0.5; // Global island edge shaping (center emphasis + coast irregularity)

        // Map settings
        const PLAYER_STARTING_POSITION_X = 1000; // Player starting x-coordinate
        const PLAYER_STARTING_POSITION_Y = 1000; // Player starting y-coordinate
        const MAP_X_MIN = 0;         // Top x-coordinate of the map
        const MAP_Y_MIN = 0;         // Top y-coordinate of the map
        const MAP_X_MAX = PLAYER_STARTING_POSITION_X * 2; // Bottom x-coordinate of the map
        const MAP_Y_MAX  = PLAYER_STARTING_POSITION_Y * 2; // Bottom y-coordinate of the map

        // Terrain fallback colors for each terrain type (used when no texture is available).
        const TERRAIN_COLORS = {
            ocean: "#37498b",
            water: "#6b81da",
            beach: "#cfcb89",
            desert: "#cfcb89",
            shrubland: "#a7c576",
            grassland: "#5fa323",
            plains: "#a7c576",
            temperate_forest: "#356b47",
            rainforest: "#698f65",
            taiga: "#698f65",
            tundra: "#d0d1c4",
            forest: "#356b47",
            forest2: "#698f65",
            alpine: "#d0d1c4",
            alpine_tundra: "#d0d1c4",
            mountaintop: "#ffffff",
            mountain: "#afb999",
            mountain2: "#d0d1c4",
            snow: "#ffffff"
        };

        // World terrain/biome reference ranges for later biome correlation work.
        // Temperature + precipitation values are based on NASA "Mission: Biomes":
        // https://science.nasa.gov/kids/earth/mission-biomes/
        // (desert, tundra, grassland, rainforest, shrubland, coniferous, temperate deciduous)
        // Elevation bands are practical global terrain heuristics (typical occurrence bands).
        // `elevationNorm` uses this map's internal 0..1 elevation space.
        // `moistureNorm` is a 0..1 moisture proxy tuned to this project model.
        const WORLD_TERRAIN_RANGES = window.WORLD_TERRAIN_RANGES || [];

        // Terrain model tuning
        const TERRAIN_MODEL = {
            // deterministic offsets to derive independent noise fields from one seeded generator
            elevationOffsetX: 1013,
            elevationOffsetY: -809,
            moistureOffsetX: -4777,
            moistureOffsetY: 2089,
            ridgeOffsetX: 3307,
            ridgeOffsetY: -7123,
            mountainnessOffsetX: 9017,
            mountainnessOffsetY: -4561,
            coastOffsetX: -1861,
            coastOffsetY: 7421,

            // fBm settings
            octaves: 5,
            lacunarity: 2.0,
            gain: 0.5,

            // redistribution shaping
            elevationExponent: 1.10,
            moistureExponent: 1.05,
            islandMix: 0.55,
            islandCoastJitterStrength: 0.18,
            islandDistancePower: 1.10,
            islandCoastNoiseZoom: 55,

            // regional terrain shaping
            mountainRegionZoom: 42,
            mountainRegionThreshold0: 0.52,
            mountainRegionThreshold1: 0.78,
            mountainRegionProfilePower: 1.8,
            mountainBaseEdge: 0.62,
            mountainBaseCore: 0.82,
            mountainBlendStrength: 0.88,
            waterRegionProfilePower: 1.6,
            waterBaseEdge: 0.40,
            waterBaseCore: 0.26,
            waterBlendStrength: 0.32,
            lowlandSinkStrength: 0.16
        };

        const terrainCache = new Map();
        const terrainPatternCache = new Map();
        const terrainPatternLoadState = new Map();

        //////////////////////////////////////////////////////////////////////////////////////////////////////////////////// 
        // Functions
        //////////////////////////////////////////////////////////////////////////////////////////////////////////////////// 

        // Function for terrain generation
        // This function generates a terrain type based on the noise value at a given (x, y) coordinate.
        // Please read https://www.redblobgames.com/maps/terrain-from-noise/ for ideas on what I am trying to do here.
        function clamp01(v) {
            return Math.max(0, Math.min(1, v));
        }

        function normalizeNoise(v) {
            // perlin2 outputs roughly [-1..1]; normalize to [0..1]
            return clamp01((v + 1) * 0.5);
        }

        function smoothstep(edge0, edge1, x) {
            const t = clamp01((x - edge0) / (edge1 - edge0));
            return t * t * (3 - 2 * t);
        }

        function fbmNoise2(x, y, zoom, offsetX, offsetY) {
            let amplitude = 1.0;
            let frequency = 1.0;
            let sum = 0.0;
            let amplitudeSum = 0.0;

            for (let i = 0; i < TERRAIN_MODEL.octaves; i += 1) {
                const nx = ((x + offsetX) / zoom) * frequency;
                const ny = ((y + offsetY) / zoom) * frequency;
                sum += noise.perlin2(nx, ny) * amplitude;
                amplitudeSum += amplitude;
                frequency *= TERRAIN_MODEL.lacunarity;
                amplitude *= TERRAIN_MODEL.gain;
            }
            return sum / amplitudeSum;
        }

        function ridgedNoise2(x, y, zoom, offsetX, offsetY) {
            // Ridged variant often used for mountain-like structures.
            // Inspired by Red Blob's recommendation to combine noise variants for landform detail.
            const n = fbmNoise2(x, y, zoom, offsetX, offsetY);
            return 1.0 - Math.abs(n); // [0..1] with sharp ridges near 1
        }

        function pickBiome(temperature, moisture, finalElevation, ridge) {
            // Name biome from final (post-ridge) elevation first, then climate.
            if (finalElevation > 0.86) return "mountaintop";
            if (finalElevation > 0.76) return ridge > 0.65 ? "alpine" : "mountain";
            if (finalElevation > 0.66 && temperature < 0.35) return "alpine_tundra";

            if (temperature < 0.20) return (moisture < 0.45 ? "tundra" : "snow");
            if (temperature < 0.35) return (moisture < 0.35 ? "tundra" : "taiga");
            if (temperature < 0.55) {
                if (moisture < 0.25) return "shrubland";
                if (moisture < 0.55) return "grassland";
                return "temperate_forest";
            }
            if (moisture < 0.18) return "desert";
            if (moisture < 0.42) return "plains";
            if (moisture < 0.72) return "forest";
            return "rainforest";
        }

        function biomeToTerrain(biome) {
            // Keep terrain names aligned with biome names unless a remap is required.
            switch (biome) {
                case "desert":
                case "plains":
                case "grassland":
                case "shrubland":
                case "temperate_forest":
                case "rainforest":
                case "taiga":
                case "forest":
                case "tundra":
                case "mountain":
                case "alpine":
                case "alpine_tundra":
                case "mountaintop":
                case "snow":
                    return biome;
                default:
                    return "grassland";
            }
        }

        function getTerrainInfo(x, y) {
            const isOutsideMap = (x < MAP_X_MIN || x > MAP_X_MAX || y < MAP_Y_MIN || y > MAP_Y_MAX);

            if (isOutsideMap) {
                return {
                    terrain: "ocean",
                    biome: "ocean",
                    elevation: 0,
                    moisture: 0,
                    temperature: 0,
                    ridge: 0,
                    zone: "outside"
                };
            }

            // [Item 1] Base terrain signals (Red Blob style): compute independent elevation/moisture noise fields.
            let elevation = normalizeNoise(
                fbmNoise2(x, y, NOISE_ZOOM, TERRAIN_MODEL.elevationOffsetX, TERRAIN_MODEL.elevationOffsetY)
            );
            let moisture = normalizeNoise(
                fbmNoise2(x, y, NOISE_ZOOM * 1.4, TERRAIN_MODEL.moistureOffsetX, TERRAIN_MODEL.moistureOffsetY)
            );

            // [Item 2] Redistribute base noise to control global land/water and biome proportions.
            elevation = Math.pow(elevation, TERRAIN_MODEL.elevationExponent);
            moisture = Math.pow(moisture, TERRAIN_MODEL.moistureExponent);
            moisture = clamp01(moisture * moistureMultiplier);

            // [Item 3] Replace hard rectangular edge tiles with center-distance island shaping.
            // Distance function (radial): 0 near center, ~1 near map boundary.
            const centerX = (MAP_X_MIN + MAP_X_MAX) * 0.5;
            const centerY = (MAP_Y_MIN + MAP_Y_MAX) * 0.5;
            const halfWidth = (MAP_X_MAX - MAP_X_MIN) * 0.5;
            const halfHeight = (MAP_Y_MAX - MAP_Y_MIN) * 0.5;
            const nx = (x - centerX) / halfWidth;
            const ny = (y - centerY) / halfHeight;
            let centerDistance = Math.sqrt((nx * nx) + (ny * ny));
            centerDistance = clamp01(Math.pow(centerDistance, TERRAIN_MODEL.islandDistancePower));

            // [Item 4] Add low-frequency coastline jitter so borders are irregular, not perfectly geometric.
            const coastNoise = normalizeNoise(
                fbmNoise2(
                    x,
                    y,
                    NOISE_ZOOM * TERRAIN_MODEL.islandCoastNoiseZoom,
                    TERRAIN_MODEL.coastOffsetX,
                    TERRAIN_MODEL.coastOffsetY
                )
            );
            const islandMixValue = clamp01(0.20 + (islandShapeMultiplier * 0.70)); // 50% -> 0.55 baseline
            const islandJitterValue = 0.06 + (islandShapeMultiplier * 0.24); // 50% -> 0.18 baseline
            centerDistance = clamp01(
                centerDistance + ((coastNoise - 0.5) * islandJitterValue)
            );

            // [Item 5] Blend in an island target (1 - distance), so elevation drops toward edges naturally.
            const islandTargetElevation = 1 - centerDistance;
            elevation = clamp01(
                (elevation * (1 - islandMixValue)) +
                (islandTargetElevation * islandMixValue)
            );

            // [Item 6] Regional mountain/water shaping on top of island-form elevation.
            const mountainness = normalizeNoise(
                fbmNoise2(
                    x,
                    y,
                    NOISE_ZOOM * TERRAIN_MODEL.mountainRegionZoom,
                    TERRAIN_MODEL.mountainnessOffsetX,
                    TERRAIN_MODEL.mountainnessOffsetY
                )
            );
            const mountainThreshold0 = clamp01(
                TERRAIN_MODEL.mountainRegionThreshold0 + ((0.5 - mountainMultiplier) * 0.24)
            );
            const mountainThreshold1 = clamp01(
                TERRAIN_MODEL.mountainRegionThreshold1 + ((0.5 - mountainMultiplier) * 0.28)
            );
            const mountainRegion = smoothstep(
                mountainThreshold0,
                mountainThreshold1,
                mountainness
            );
            const mountainProfile = Math.pow(mountainRegion, TERRAIN_MODEL.mountainRegionProfilePower);
            const lowlandDepth = 1 - smoothstep(0.22, 0.45, elevation); // strongest sink on already-low terrain
            const mountainBaseline =
                TERRAIN_MODEL.mountainBaseEdge +
                (TERRAIN_MODEL.mountainBaseCore - TERRAIN_MODEL.mountainBaseEdge) * mountainProfile;
            const mountainStrength = 0.2 + (mountainMultiplier * 1.6); // 0..100% maps to 0.2..1.8, 50% ~= baseline
            const mountainBlend = clamp01(mountainRegion * TERRAIN_MODEL.mountainBlendStrength * mountainStrength);
            elevation = clamp01((elevation * (1 - mountainBlend)) + (mountainBaseline * mountainBlend));

            // Use inverse mountainness to carve coherent lowland/water basins.
            const waterThreshold0 = clamp01(1 - mountainThreshold1);
            const waterThreshold1 = clamp01(1 - mountainThreshold0);
            const waterRegion = smoothstep(
                waterThreshold0,
                waterThreshold1,
                1 - mountainness
            );
            const waterProfile = Math.pow(waterRegion, TERRAIN_MODEL.waterRegionProfilePower);
            const waterBaseline =
                TERRAIN_MODEL.waterBaseEdge +
                (TERRAIN_MODEL.waterBaseCore - TERRAIN_MODEL.waterBaseEdge) * waterProfile;
            const waterLowlandGate = 1 - smoothstep(0.38, 0.60, elevation); // only carve strongly in lower terrain
            const waterBlend = clamp01(waterRegion * TERRAIN_MODEL.waterBlendStrength * waterLowlandGate);
            elevation = clamp01((elevation * (1 - waterBlend)) + (waterBaseline * waterBlend));

            elevation = clamp01(elevation - (lowlandDepth * TERRAIN_MODEL.lowlandSinkStrength * (1 - mountainRegion)));

            // [Change 6] Temperature proxy: latitude + elevation cooling.
            const lat01 = (y - MAP_Y_MIN) / (MAP_Y_MAX - MAP_Y_MIN); // 0 north .. 1 south
            const equatorDistance = Math.abs(lat01 - 0.5) * 2; // 0 equator .. 1 poles
            const baseTemperature = 1 - (equatorDistance * 0.85);
            const temperature = clamp01(baseTemperature - (elevation * 0.45));

            // [Change 7] Coast and mountain refinement with separate ridge signal.
            const ridge = ridgedNoise2(x, y, NOISE_ZOOM * 0.9, TERRAIN_MODEL.ridgeOffsetX, TERRAIN_MODEL.ridgeOffsetY);
            const mountainBoost = smoothstep(0.58, 0.88, elevation) * smoothstep(0.55, 0.82, ridge);
            const elevated = clamp01(elevation + mountainBoost * 0.25);

            // Water/coast bands first
            if (elevated < 0.08) {
                return { terrain: "ocean", biome: "ocean", elevation: elevated, moisture: moisture, temperature: temperature, ridge: ridge, zone: "inland" };
            }
            if (elevated < 0.10) {
                return { terrain: "water", biome: "shallow_water", elevation: elevated, moisture: moisture, temperature: temperature, ridge: ridge, zone: "inland" };
            }
            if (elevated < 0.12) {
                return { terrain: "beach", biome: "coast", elevation: elevated, moisture: moisture, temperature: temperature, ridge: ridge, zone: "inland" };
            }

            // Biome selection after ridge application, based on final elevation.
            const biome = pickBiome(temperature, moisture, elevated, ridge);
            const terrain = biomeToTerrain(biome);

            return {
                terrain: terrain,
                biome: biome,
                elevation: elevated,
                moisture: moisture,
                temperature: temperature,
                ridge: ridge,
                zone: "inland"
            };
        }

        // [Change 8] Determinism note:
        // We keep one global noise seed and derive independent fields through fixed coordinate offsets.
        // This keeps map generation stable/reproducible while allowing multiple pseudo-independent signals.

        function getCachedTerrainInfo(x, y) {
            const cacheKey = `${x},${y}`;
            if (USE_TERRAIN_CACHE && terrainCache.has(cacheKey)) {
                return terrainCache.get(cacheKey);
            }

            const info = getTerrainInfo(x, y);
            if (USE_TERRAIN_CACHE) {
                terrainCache.set(cacheKey, info);
            }
            return info;
        }

        function generateTerrain(x, y) {
            return getCachedTerrainInfo(x, y).terrain;
        }

        function classifyTemperatureBand(temperature01) {
            if (temperature01 < 0.33) return "cold";
            if (temperature01 < 0.66) return "temperate";
            return "hot";
        }

        function classifyMoistureBand(moisture01) {
            if (moisture01 < 0.33) return "dry";
            if (moisture01 < 0.66) return "normal";
            return "wet";
        }

        function getTerrainTextureVariant(info) {
            // Water/coast currently render with flat colors.
            if (info.biome === "ocean" || info.biome === "shallow_water" || info.biome === "coast") {
                return null;
            }

            const temperatureBand = classifyTemperatureBand(info.temperature);
            const moistureBand = classifyMoistureBand(info.moisture);
            const textureBiome = info.biome === "mountaintop" ? "snow" : info.biome;
            return `${textureBiome}_${temperatureBand}_${moistureBand}`;
        }

        function getTerrainPattern(info) {
            if (!USE_TERRAIN_TEXTURES) {
                return null;
            }

            const variant = getTerrainTextureVariant(info);
            if (!variant) {
                return null;
            }
            if (terrainPatternCache.has(variant)) {
                return terrainPatternCache.get(variant);
            }
            const knownLoadState = terrainPatternLoadState.get(variant);
            if (knownLoadState === "loading" || knownLoadState === "missing") {
                return null;
            }

            terrainPatternLoadState.set(variant, "loading");
            const img = new Image();
            img.onload = () => {
                const pattern = context.createPattern(img, "repeat");
                if (pattern) {
                    terrainPatternCache.set(variant, pattern);
                    terrainPatternLoadState.set(variant, "ready");
                    redraw(currentTransform);
                } else {
                    terrainPatternLoadState.set(variant, "missing");
                }
            };
            img.onerror = () => {
                terrainPatternLoadState.set(variant, "missing");
            };
            img.src = `${TERRAIN_TEXTURE_ROOT}/${variant}.png`;
            return null;
        }

        // Function for turning a terrain tile into graphical output
        // At his point we assume the x and y are the top-left corner of the tile, and the size is the size of the tile.
        // Also, the coordinates are already transformed by the zoom level and translation.
        // Note that the tile may be partially visible, so you may need to draw a partial tile.
        function drawTile(info, x, y, size) {
            // Snap to device pixels to prevent anti-aliased seams between adjacent tiles.
            const x0 = Math.floor(x);
            const y0 = Math.floor(y);
            const x1 = Math.ceil(x + size);
            const y1 = Math.ceil(y + size);
            const drawW = Math.max(1, x1 - x0);
            const drawH = Math.max(1, y1 - y0);

            const pattern = getTerrainPattern(info);
            if (pattern) {
                context.fillStyle = pattern;
                context.fillRect(x0, y0, drawW, drawH);
                return;
            }

            const terrain = info.terrain;
            switch (terrain) {
                case "ocean":
                    context.fillStyle = USE_RANDOM_WATER_COLOR
                        ? `rgba(30, 125, ${Math.floor(128 + Math.random() * 72)}, 1)`
                        : TERRAIN_COLORS.ocean;
                    break;
                case "water":
                    context.fillStyle = USE_RANDOM_WATER_COLOR
                        ? `rgba(30, 125, ${Math.floor(200 + Math.random() * 55)}, 1)`
                        : TERRAIN_COLORS.water;
                    break;
                default:
                    context.fillStyle = TERRAIN_COLORS[terrain] || "#ff00ff";
            }
            context.fillRect(x0, y0, drawW, drawH);
        }

        // Compute visible world tile range directly from transform (no player-position projection).
        function computeTiles(transform) {
            const k = transform.k;
            const tilePx = TILE_SIZE * k;
            const x0 = Math.floor((0 - transform.x) / tilePx) - 1;
            const x1 = Math.floor((canvas.width - transform.x) / tilePx) + 2;
            const y0 = Math.floor((0 - transform.y) / tilePx) - 1;
            const y1 = Math.floor((canvas.height - transform.y) / tilePx) + 2;

            const tiles = [];
            for (let x = x0; x < x1; x += 1) {
                const xpos = x * tilePx + transform.x;
                for (let y = y0; y < y1; y += 1) {
                    const ypos = y * tilePx + transform.y;
                    const info = getCachedTerrainInfo(x, y);
                    tiles.push({ info: info, x: xpos, y: ypos, size: tilePx });
                }
            }
            return tiles;
        }


        // The redraw function will clear the canvas and draw the tiles that are visible on the screen.
        function redraw(transform) {
            context.clearRect(0, 0, canvas.width, canvas.height);

            if (!USE_ALLOCATION_FREE_REDRAW) {
                const tiles = computeTiles(transform);
                tiles.forEach(tile => {
                    drawTile(tile.info, tile.x, tile.y, tile.size);
                });
                return;
            }

            const k = transform.k;
            const tilePx = TILE_SIZE * k;
            const x0 = Math.floor((0 - transform.x) / tilePx) - 1;
            const x1 = Math.floor((canvas.width - transform.x) / tilePx) + 2;
            const y0 = Math.floor((0 - transform.y) / tilePx) - 1;
            const y1 = Math.floor((canvas.height - transform.y) / tilePx) + 2;

            for (let x = x0; x < x1; x += 1) {
                const xpos = x * tilePx + transform.x;
                for (let y = y0; y < y1; y += 1) {
                    const ypos = y * tilePx + transform.y;
                    const info = getCachedTerrainInfo(x, y);
                    drawTile(info, xpos, ypos, tilePx);
                }
            }
        }


        //////////////////////////////////////////////////////////////////////////////////////////////////////////////////// 
        // Create canvas 
        //////////////////////////////////////////////////////////////////////////////////////////////////////////////////// 

        // Noise.js setup
        // The noise object is a global object that can be used to generate Perlin noise.
        // The seed is set to a fixed value for consistency.
        noise.seed(12345);

        //
        // Now let's set up the canvas and the zoom behavior
        // and use those functions we created earlier
        //

        // Canvas setup
        // Create the canvas and context elements, and append the canvas to the HTML body.
        const canvas = document.createElement("canvas");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        document.body.appendChild(canvas);
        const context = canvas.getContext("2d");
        context.imageSmoothingEnabled = false;
        const tooltip = d3.select("body")
            .append("div")
            .attr("class", "tooltip");
        const logoPanel = d3.select("body")
            .append("div")
            .attr("class", "logo-panel");
        const logoImage = logoPanel.append("img")
            .attr("src", "images/fantasymapgeneratorlogo.png")
            .attr("alt", "Fantasy Map Generator logo");
        const controls = d3.select("body")
            .append("div")
            .attr("class", "control-panel");
        function positionControlsBelowLogo() {
            const logoRect = logoPanel.node().getBoundingClientRect();
            controls.style("top", `${Math.round(logoRect.bottom + 12)}px`);
        }
        logoImage.on("load", positionControlsBelowLogo);
        window.addEventListener("resize", positionControlsBelowLogo);
        positionControlsBelowLogo();
        const moistureLabel = controls.append("label")
            .attr("for", "moisture-slider")
            .text("Moisture: 50%");
        controls.append("input")
            .attr("id", "moisture-slider")
            .attr("type", "range")
            .attr("min", "0")
            .attr("max", "100")
            .attr("step", "1")
            .attr("value", "50")
            .on("input", function() {
                const value = Number(this.value);
                moistureMultiplier = value / 100;
                terrainCache.clear();
                moistureLabel.text(`Moisture: ${value}%`);
                redraw(currentTransform);
            });
        const mountainLabel = controls.append("label")
            .attr("for", "mountain-slider")
            .text("Mountains: 50%");
        controls.append("input")
            .attr("id", "mountain-slider")
            .attr("type", "range")
            .attr("min", "0")
            .attr("max", "100")
            .attr("step", "1")
            .attr("value", "50")
            .on("input", function() {
                const value = Number(this.value);
                mountainMultiplier = value / 100;
                terrainCache.clear();
                mountainLabel.text(`Mountains: ${value}%`);
                redraw(currentTransform);
            });
        const islandLabel = controls.append("label")
            .attr("for", "island-slider")
            .text("Island Shape: 50%");
        controls.append("input")
            .attr("id", "island-slider")
            .attr("type", "range")
            .attr("min", "0")
            .attr("max", "100")
            .attr("step", "1")
            .attr("value", "50")
            .on("input", function() {
                const value = Number(this.value);
                islandShapeMultiplier = value / 100;
                terrainCache.clear();
                islandLabel.text(`Island Shape: ${value}%`);
                redraw(currentTransform);
            });

        const backgroundMusic = new Audio(BACKGROUND_MUSIC_URL);
        backgroundMusic.loop = true;
        backgroundMusic.preload = "auto";
        backgroundMusic.volume = DEFAULT_BACKGROUND_MUSIC_VOLUME;

        const musicToggle = controls.append("button")
            .attr("id", "music-toggle")
            .attr("type", "button")
            .text("Play Music");

        const musicVolumeLabel = controls.append("label")
            .attr("for", "music-volume")
            .text(`Music Volume: ${Math.round(DEFAULT_BACKGROUND_MUSIC_VOLUME * 100)}%`);

        controls.append("input")
            .attr("id", "music-volume")
            .attr("type", "range")
            .attr("min", "0")
            .attr("max", "100")
            .attr("step", "1")
            .attr("value", String(Math.round(DEFAULT_BACKGROUND_MUSIC_VOLUME * 100)))
            .on("input", function() {
                const value = Number(this.value);
                backgroundMusic.volume = Math.max(0, Math.min(1, value / 100));
                musicVolumeLabel.text(`Music Volume: ${value}%`);
            });

        function syncMusicButtonState() {
            const isPlaying = !backgroundMusic.paused && !backgroundMusic.ended;
            musicToggle.text(isPlaying ? "Pause Music" : "Play Music");
        }

        async function attemptStartBackgroundMusic(reason) {
            try {
                await backgroundMusic.play();
                syncMusicButtonState();
            } catch (_error) {
                // Browser autoplay policy usually requires an explicit user gesture.
                syncMusicButtonState();
                console.info(`[music] Background music start blocked (${reason}). Use the music button to start playback.`);
            }
        }

        backgroundMusic.addEventListener("play", syncMusicButtonState);
        backgroundMusic.addEventListener("pause", syncMusicButtonState);
        backgroundMusic.addEventListener("ended", syncMusicButtonState);
        backgroundMusic.addEventListener("error", () => {
            console.info(`[music] Could not load background track at ${BACKGROUND_MUSIC_URL}.`);
            syncMusicButtonState();
        });

        musicToggle.on("click", async () => {
            if (!backgroundMusic.paused && !backgroundMusic.ended) {
                backgroundMusic.pause();
                return;
            }
            await attemptStartBackgroundMusic("user_click");
        });

        syncMusicButtonState();
        attemptStartBackgroundMusic("autoplay");

        //////////////////////////////////////////////////////////////////////////////////////////////////////////////////// 
        // Create the event listeners for resize, zoom, and keydown/keyup on the canvas and the window
        ////////////////////////////////////////////////////////////////////////////////////////////////////////////////////

        // Add the behaviour to apply zooming to the canvas
        // The zoom behavior is defined using d3.zoom() and applied to the canvas element.

        // Set the initial camera transform (start tile centered on screen)
        let currentTransform = d3.zoomIdentity.translate(
            (canvas.width / 2) - (PLAYER_STARTING_POSITION_X * TILE_SIZE),
            (canvas.height / 2) - (PLAYER_STARTING_POSITION_Y * TILE_SIZE)
        );

        // Keep zoom behavior simple like d3-fantasychart3:
        // let D3 manage wheel zoom focus natively (world point under cursor stays fixed).
        const zoomBehavior = d3.zoom()
            .scaleExtent([1, 8])
            .on("zoom", (event) => {
                currentTransform = event.transform;
                redraw(currentTransform);
            });

        // Apply the behavior and synchronize the initial transform state.
        d3.select(canvas).call(zoomBehavior).call(zoomBehavior.transform, currentTransform);

        // Add a resize listener. This will redraw the tiles when the window is resized.
        // It also debounces the resize event, so it doesn't redraw the tiles too often, using a timer with a short timeout.

        // Declare resizeTimeout outside the eventlistener. Keep it undefined for now.
        let resizeTimeout;

        // Add the event listener for the resize. It redraws the tiles when the window is resized.
        window.addEventListener("resize", () => {
            // Clear the existing timer if there is one already
            if (resizeTimeout) {
                clearTimeout(resizeTimeout);
            }

            // Start a new timer
            resizeTimeout = setTimeout(() => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;

                // Reapply the old currentTransform after resizing
                // This prevents the map from jumping around when resizing
                d3.select(canvas).call(zoomBehavior.transform, currentTransform);
                redraw(currentTransform);
            }, 100); // Stel de debounce-tijd in (bijvoorbeeld 100 ms)
        });

        // Track the state of the keys
        const keys = {};

        // Add keydown event listeners for the WASD-keys keyup and keydown events, so you can keep pressing the keys to move the player.
        window.addEventListener("keydown", (event) => {
            keys[event.key] = true;
            handleMovement();
        });

        window.addEventListener("keyup", (event) => {
            keys[event.key] = false;
        });

        canvas.addEventListener("mousemove", (event) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = event.clientX - rect.left;
            const mouseY = event.clientY - rect.top;
            const tilePx = TILE_SIZE * currentTransform.k;
            const tileX = Math.floor((mouseX - currentTransform.x) / tilePx);
            const tileY = Math.floor((mouseY - currentTransform.y) / tilePx);
            const info = getCachedTerrainInfo(tileX, tileY);
            const color = TERRAIN_COLORS[info.terrain] || "n/a";

            tooltip
                .style("opacity", 1)
                .html(
                    `Terrain: ${info.terrain}<br>` +
                    `Biome: ${info.biome}<br>` +
                    `Color: ${color}<br>` +
                    `x: ${tileX}, y: ${tileY}<br>` +
                    `Zone: ${info.zone}<br>` +
                    `Elevation: ${info.elevation.toFixed(3)}<br>` +
                    `Moisture: ${info.moisture.toFixed(3)}<br>` +
                    `Temp: ${info.temperature.toFixed(3)}<br>` +
                    `Ridge: ${info.ridge.toFixed(3)}<br>` +
                    `Zoom: ${currentTransform.k.toFixed(2)}`
                );
        });

        canvas.addEventListener("mouseleave", () => {
            tooltip.style("opacity", 0);
        });

        function handleMovement() {
            let moved = false;

            // Fixed: movement should be one tile per keypress independent of zoom scale.


            if (keys["w"]) {
                currentTransform = currentTransform.translate(0, MOVE_AMOUNT);
                moved = true;
            }
            if (keys["a"]) {
                currentTransform = currentTransform.translate(MOVE_AMOUNT, 0);
                moved = true;
            }
            if (keys["s"]) {
                currentTransform = currentTransform.translate(0, -MOVE_AMOUNT);
                moved = true;
            }
            if (keys["d"]) {
                currentTransform = currentTransform.translate(-MOVE_AMOUNT, 0);
                moved = true;
            }

            if (moved) {
                d3.select(canvas).call(zoomBehavior.transform, currentTransform);
            }
        }

        //////////////////////////////////////////////////////////////////////////////////////////////////////////////////// 
        // Finish up and show the initial screen
        ////////////////////////////////////////////////////////////////////////////////////////////////////////////////////

        // Ensure the canvas has focus so our keys actually apply to the terrain
        canvas.tabIndex = 1; // Make the canvas focusable
        canvas.focus();

        // Draw the initial screen
        redraw(currentTransform);
    </script>
</body>
</html>
