        //////////////////////////////////////////////////////////////////////////////////////////////////////////////////// 
        // Create the event listeners for resize, zoom, and keydown/keyup on the canvas and the window
        ////////////////////////////////////////////////////////////////////////////////////////////////////////////////////

        // Add the behaviour to apply zooming to the canvas
        // The zoom behavior is defined using d3.zoom() and applied to the canvas element.

        // Set the initial camera transform (start tile centered on screen)
        let currentTransform = d3.zoomIdentity.translate(
            (canvas.width / 2) - (PLAYER_STARTING_POSITION_X * TILE_SIZE),
            (canvas.height / 2) - (PLAYER_STARTING_POSITION_Y * TILE_SIZE)
        );

        function clampCameraTransform(transform) {
            const k = transform.k;
            const tilePx = TILE_SIZE * k;
            const worldMinX = MAP_X_MIN * tilePx;
            const worldMaxX = (MAP_X_MAX + 1) * tilePx;
            const worldMinY = MAP_Y_MIN * tilePx;
            const worldMaxY = (MAP_Y_MAX + 1) * tilePx;

            const minTranslateX = canvas.width - worldMaxX;
            const maxTranslateX = -worldMinX;
            const minTranslateY = canvas.height - worldMaxY;
            const maxTranslateY = -worldMinY;

            let clampedX;
            let clampedY;
            if (minTranslateX > maxTranslateX) {
                clampedX = (minTranslateX + maxTranslateX) * 0.5;
            } else {
                clampedX = Math.max(minTranslateX, Math.min(maxTranslateX, transform.x));
            }
            if (minTranslateY > maxTranslateY) {
                clampedY = (minTranslateY + maxTranslateY) * 0.5;
            } else {
                clampedY = Math.max(minTranslateY, Math.min(maxTranslateY, transform.y));
            }

            return d3.zoomIdentity.translate(clampedX, clampedY).scale(k);
        }

        function applyTransform(nextTransform) {
            currentTransform = clampCameraTransform(nextTransform);
            d3.select(canvas).call(zoomBehavior.transform, currentTransform);
        }

        // Keep zoom behavior simple like d3-fantasychart3:
        // let D3 manage wheel zoom focus natively (world point under cursor stays fixed).
        const zoomBehavior = d3.zoom()
            .scaleExtent([MIN_TILE_PIXEL_SIZE / TILE_SIZE, 8])
            .on("zoom", (event) => {
                const clamped = clampCameraTransform(event.transform);
                const changed =
                    Math.abs(clamped.x - event.transform.x) > 0.001 ||
                    Math.abs(clamped.y - event.transform.y) > 0.001 ||
                    Math.abs(clamped.k - event.transform.k) > 0.001;
                if (changed) {
                    d3.select(canvas).call(zoomBehavior.transform, clamped);
                    return;
                }
                currentTransform = clamped;
                redraw(currentTransform);
            });

        // Apply the behavior and synchronize the initial transform state.
        currentTransform = clampCameraTransform(currentTransform);
        d3.select(canvas).call(zoomBehavior).call(zoomBehavior.transform, currentTransform);

        // Add a resize listener. This will redraw the tiles when the window is resized.
        // It also debounces the resize event, so it doesn't redraw the tiles too often, using a timer with a short timeout.

        // Declare resizeTimeout outside the eventlistener. Keep it undefined for now.
        let resizeTimeout;

        // Add the event listener for the resize. It redraws the tiles when the window is resized.
        window.addEventListener("resize", () => {
            // Clear the existing timer if there is one already
            if (resizeTimeout) {
                clearTimeout(resizeTimeout);
            }

            // Start a new timer
            resizeTimeout = setTimeout(() => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                terrainLayerCanvas.width = canvas.width;
                terrainLayerCanvas.height = canvas.height;
                initializeCloudSprites();

                // Reapply the old currentTransform after resizing
                // This prevents the map from jumping around when resizing
                applyTransform(currentTransform);
            }, 100); // Stel de debounce-tijd in (bijvoorbeeld 100 ms)
        });

        // Track the state of the keys
        const keys = {};

        // Add keydown event listeners for the WASD-keys keyup and keydown events, so you can keep pressing the keys to move the player.
        window.addEventListener("keydown", (event) => {
            keys[event.key] = true;
            handleMovement();
        });

        window.addEventListener("keyup", (event) => {
            keys[event.key] = false;
        });

        canvas.addEventListener("mousemove", (event) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = event.clientX - rect.left;
            const mouseY = event.clientY - rect.top;
            const tilePx = TILE_SIZE * currentTransform.k;
            const tileX = Math.floor((mouseX - currentTransform.x) / tilePx);
            const tileY = Math.floor((mouseY - currentTransform.y) / tilePx);
            const info = getCachedTerrainInfo(tileX, tileY);
            if (isRiverLandTile(info)) {
                ensureRiverInfo(tileX, tileY, info);
            }
            ensurePathPreviewTiles();
            const isPathTile = pathPreviewTileCache.has(`${tileX},${tileY}`);
            const isOceanReplacedPathTile = pathPreviewOceanReplacementTileCache.has(`${tileX},${tileY}`);
            const color = info.biome === "lake"
                ? TERRAIN_COLORS.lake
                : (TERRAIN_COLORS[info.terrain] || "n/a");

            tooltip
                .style("opacity", 1)
                .html(
                    `Terrain: ${info.terrain}<br>` +
                    `Biome: ${info.biome}<br>` +
                    `Color: ${color}<br>` +
                    `x: ${tileX}, y: ${tileY}<br>` +
                    `Zone: ${info.zone}<br>` +
                    `Water Body: ${info.waterBodyType || "none"}<br>` +
                    `Ocean Connected: ${info.oceanConnectedWater ? "yes" : "no"}<br>` +
                    `Elevation: ${info.elevation.toFixed(3)}<br>` +
                    `Moisture: ${info.moisture.toFixed(3)}<br>` +
                    `Temp: ${info.temperature.toFixed(3)}<br>` +
                    `Ridge: ${info.ridge.toFixed(3)}<br>` +
                    `River: ${info.hasRiver ? "yes" : "no"}<br>` +
                    `River Flow: ${(info.riverFlowWeight || 0).toFixed(2)}<br>` +
                    `River Mask: ${info.riverDirectionMask || 0}<br>` +
                    `Path Tile: ${isPathTile ? "yes" : "no"}<br>` +
                    `Path Ocean Tile: ${isOceanReplacedPathTile ? "yes" : "no"}<br>` +
                    `Generated Paths: ${pathPreviewGeneratedCount}<br>` +
                    `Zoom: ${currentTransform.k.toFixed(2)}`
                );
        });

        canvas.addEventListener("mouseleave", () => {
            tooltip.style("opacity", 0);
        });

        function handleMovement() {
            let moved = false;

            // Fixed: movement should be one tile per keypress independent of zoom scale.


            if (keys["w"]) {
                currentTransform = currentTransform.translate(0, MOVE_AMOUNT);
                moved = true;
            }
            if (keys["a"]) {
                currentTransform = currentTransform.translate(MOVE_AMOUNT, 0);
                moved = true;
            }
            if (keys["s"]) {
                currentTransform = currentTransform.translate(0, -MOVE_AMOUNT);
                moved = true;
            }
            if (keys["d"]) {
                currentTransform = currentTransform.translate(-MOVE_AMOUNT, 0);
                moved = true;
            }

            if (moved) {
                applyTransform(currentTransform);
            }
        }

        function updateCloudSprites(deltaSeconds) {
            if (!ENABLE_PROCEDURAL_CLOUDS || cloudDensityMultiplier <= 0.01) {
                return;
            }
            const worldWidth = (MAP_X_MAX - MAP_X_MIN + 1);
            const worldHeight = (MAP_Y_MAX - MAP_Y_MIN + 1);
            for (let i = 0; i < cloudSprites.length; i += 1) {
                const cloud = cloudSprites[i];
                cloud.worldX += cloud.speedX * deltaSeconds;
                cloud.worldY += cloud.speedY * deltaSeconds;
                cloud.worldX = MAP_X_MIN + (((cloud.worldX - MAP_X_MIN) % worldWidth) + worldWidth) % worldWidth;
                cloud.worldY = MAP_Y_MIN + (((cloud.worldY - MAP_Y_MIN) % worldHeight) + worldHeight) % worldHeight;
            }
        }

        function startCloudAnimationLoop() {
            if (!ENABLE_PROCEDURAL_CLOUDS) {
                return;
            }

            const minFrameMs = 1000 / CLOUD_ANIMATION_FPS;
            let lastTickTs = 0;

            function tick(ts) {
                if (lastTickTs === 0) {
                    lastTickTs = ts;
                }
                const frameDeltaMs = ts - lastTickTs;
                if (frameDeltaMs >= minFrameMs) {
                    const deltaSeconds = Math.min(0.12, frameDeltaMs * 0.001);
                    updateCloudSprites(deltaSeconds);
                    composeFrame(currentTransform);
                    lastTickTs = ts;
                }
                requestAnimationFrame(tick);
            }

            requestAnimationFrame(tick);
        }

        //////////////////////////////////////////////////////////////////////////////////////////////////////////////////// 
        // Finish up and show the initial screen
        ////////////////////////////////////////////////////////////////////////////////////////////////////////////////////

        // Ensure the canvas has focus so our keys actually apply to the terrain
        canvas.tabIndex = 1; // Make the canvas focusable
        canvas.focus();

        // Draw the initial screen
        redraw(currentTransform);
        startCloudAnimationLoop();
    </script>
</body>
</html>
