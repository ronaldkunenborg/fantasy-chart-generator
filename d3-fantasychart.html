<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy Map</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="perlin.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #f0f8ff; /* Subtiele lichtblauwe achtergrond */ 
        }
    </style>
</head>
<body>
    <script>
        //////////////////////////////////////////////////////////////////////////////////////////////////////////////////// 
        // Description
        //////////////////////////////////////////////////////////////////////////////////////////////////////////////////// 
        //
        // Intent: Create a fantasy map using Perlin noise.
        //  
        // The map will consist of different terrains: water, beach, grassland, forest, mountain, and snow.
        // The map will be generated using Perlin noise, with the terrain type determined by the noise value.
        // The map will be *finite* in size, with the player starting at the center of the map.
        // The edge of the map will be at x = 0, y = 0 and player_starting_position_x*2, player_starting_position_y*2 respectively.
        // Once you reach the edge, the terrain will turn into beach (1 tile at the edge),
        // then water for negative x or y values, or for values larger than 2*player_x or 2*player_y.
        // 
        // At the start, the player is at the center of the map.
        // The player will be able to move around the map by pressing the WASD keys.
        // The player will not be able to move into the water.
        // The player will be able to move into the beach, but only if the player is moving away from the water.
        // The player will be able to move into the grassland, forest, mountain, and snow.
        // The player will not be able to move off the map.

        //////////////////////////////////////////////////////////////////////////////////////////////////////////////////// 
        // Settings
        //////////////////////////////////////////////////////////////////////////////////////////////////////////////////// 

        // Tile settings
        const TILE_SIZE = 8;         // Size of tile in pixels
        const MOVE_AMOUNT = TILE_SIZE; // Nr of pixels to move when a key is pressed
        const NOISE_ZOOM = 10;       // Zoom level for the noise function. Higher zoom gives less variation in terrain.

        // Map settings
        const PLAYER_STARTING_POSITION_X = 10000; // Player starting x-coordinate
        const PLAYER_STARTING_POSITION_Y = 10000; // Player starting y-coordinate
        const MAP_X_MIN = 0;         // Top x-coordinate of the map
        const MAP_Y_MIN = 0;         // Top y-coordinate of the map
        const MAP_X_MAX = PLAYER_STARTING_POSITION_X * 2; // Bottom x-coordinate of the map
        const MAP_Y_MAX  = PLAYER_STARTING_POSITION_Y * 2; // Bottom y-coordinate of the map

        let g_player_x = PLAYER_STARTING_POSITION_X;        // Current player x-coordinate.
        let g_player_y = PLAYER_STARTING_POSITION_X;        // Current player y-coordinate

        // Terrain colors for each terrain type
        // Later, you might replace this with bitmaps or more complex textures.
        const TERRAIN_COLORS = {
            ocean: "#1f7880", // Updated ocean color
            water: "#1f78b4",
            beach: "#f4d78c", // Updated beach color
            grassland: "#7cfc00",
            plains: "#b2df8a",            
            forest: "#228b22",
            forest2: "#33a02c",
            mountain: "#6a3d9a",
            mountain2: "#bbccdd",
            snow: "#ffffff"
        };

        // Initialize the variables that hold the number of tiles that will fit in the canvas,
        //  given current TILE_SIZE, canvas width and height and zoom level.
        // This will have to be changed every time the screen changes in size, something moves, or the zoom level changes.
        let g_nr_of_tiles_x = 0;
        let g_nr_of_tiles_y = 0;

        //////////////////////////////////////////////////////////////////////////////////////////////////////////////////// 
        // Functions
        //////////////////////////////////////////////////////////////////////////////////////////////////////////////////// 

        // Function for terrain generation
        // This function generates a terrain type based on the noise value at a given (x, y) coordinate.
        // Please read https://www.redblobgames.com/maps/terrain-from-noise/ for ideas on what I am trying to do here.
        function generateTerrain(x, y) {
            // first check if the (x,y) terrain is at the edge of the map. This should be beach.
            if (x <= MAP_X_MIN || x >= MAP_X_MAX || y <= MAP_Y_MIN || y >= MAP_Y_MAX) {
                if (x == MAP_X_MIN || x == MAP_X_MAX || y == MAP_Y_MIN || y == MAP_Y_MAX) {
                    // Terrain at the edge of the map is beach
                    return "beach";
                } else {    
                    // Terrain outside the map is water
                    return "ocean";
                }
            }
            // for all other coordinates, calculate the terrain based on the noise value
            // const value = noise.simplex2(x / NOISE_ZOOM, y / NOISE_ZOOM); // Use simplex2 for 2D noise
            const value = noise.perlin2(x / NOISE_ZOOM, y / NOISE_ZOOM); // Use perlin2 for 2D noise
            // console.log(`x: ${x}, y: ${y}, value: ${value}`);
            if (value < -0.2) return "water";
            if (value < 0.1) return "beach";
            if (value < 0.3) return "grassland";
            if (value < 0.5) return "forest";
            if (value < 0.8) return "mountain";
            return "snow";
        }

        // Function for turning a terrain tile into graphical output
        // At his point we assume the x and y are the top-left corner of the tile, and the size is the size of the tile.
        // Also, the coordinates are already transformed by the zoom level and translation.
        // Note that the tile may be partially visible, so you may need to draw a partial tile.
        function drawTile(terrain, x, y, size) {
            switch(terrain) {
                case "ocean":
                    context.fillStyle = `rgba(30, 125, ${Math.floor(128 + Math.random()*72)}, 1)`; // ocean coloring
                    break;
                case "water":
                    context.fillStyle = `rgba(30, 125, ${Math.floor(200 + Math.random()*55)}, 1)`; // Updated water color
                    break;
                default:
                context.fillStyle = TERRAIN_COLORS[terrain];
                }
            context.fillRect(x, y, size, size);
        }

        // Calculate the maximum nr of tiles in x- en y-directions that will be visible for the current zoom level and canvas size.
        // This will be used in the redraw function to determine which tiles to draw.
        // Note that the number of tiles will be rounded down to the nearest integer, so you will need to take partial tiles into account
        //  when drawing the tiles.
        function calculateNrOfTiles(transform) {
            const scale = transform.k;
            g_nr_of_tiles_x = Math.floor(canvas.width / TILE_SIZE / scale);
            g_nr_of_tiles_y = Math.floor(canvas.height / TILE_SIZE / scale);
        }
        
        function calculateNewPlayerPosition(transform) {
            // Calculate the new player position based on the current player position and the transform.
            // The player position is the center of the screen, so the player position is the negative of the translation.
            // TranslateX and translateY are the translations in x and y directions.
            // The translation is a movement in the direction opposite to the movement of the player,
            //  hence the negative values for translateX and translateY.
            console.log(`transform: ${transform}`);

            // Scale is the zoom level (1-8). This is interpolated on a quadratic curve: 1, 1.13, 2, ..., 4, ..., 8.
            const scale = transform.k; 
            const translateX = transform.x / scale;
            const translateY = transform.y / scale;
            console.log(`translateX: ${translateX}, translateY: ${translateY}, scale: ${scale}`);

            // Calculate the new player x- and y-coordinates. If the movement is smaller than a single tile, set movement to 0 for now.
            // later, we may want to allow the player to move a fraction of a tile.
            // the translation will continually update, so the player position is the starting position plus the translation.

            console.log(`before: g_player_x: ${g_player_x}, g_player_y: ${g_player_y}`);
            g_player_x = PLAYER_STARTING_POSITION_X + Math.floor(translateX / TILE_SIZE);        // Current player x-coordinate.
            g_player_y = PLAYER_STARTING_POSITION_X + Math.floor(translateY / TILE_SIZE);        // Current player y-coordinate
            console.log(`after: g_player_x: ${g_player_x}, g_player_y: ${g_player_y}`);
        }


        // This function calculates the tiles that are visible on the screen, based on the current zoom level and player position.
        // It returns an array of tiles that should be drawn on the screen.
        // The preconditions are:
        //      - the canvas width and height are set correctly (even after a resize)
        //      - the current position of the player has been set in g_player_x and g_player_y
        //      - the width of the canvas in tiles has been set in g_nr_of_tiles_x and g_nr_of_tiles_y
        //      - the current zoom level has been set in currentTransform.k
        function computeTiles(transform) {
            // Scale is the zoom level (1-8). This is interpolated on a quadratic curve: 1, 1.13, 2, ..., 4, ..., 8.
            const scale = transform.k; 

            const currentWidth = canvas.width;
            const currentHeight = canvas.height;

            console.log(g_nr_of_tiles_x, g_nr_of_tiles_y, currentWidth, currentHeight); 

            // Calculate how many tiles fit on the screen
            // Add an extra tile each way to prevent flickering when moving and in case it is needed for the edge tiles
            const left_tile_x = g_player_x - Math.floor(g_nr_of_tiles_x / 2) - 1;
            const right_tile_x = g_player_x + Math.floor(g_nr_of_tiles_x / 2) + 1;
            const top_tile_y = g_player_y - Math.floor(g_nr_of_tiles_y / 2) - 1;
            const bottom_tile_y = g_player_y + Math.floor(g_nr_of_tiles_y / 2) + 1;            
            console.log(`left_tile_x: ${left_tile_x}, right_tile_x: ${right_tile_x}, top_tile_y: ${top_tile_y}, bottom_tile_y: ${bottom_tile_y}`);

            // Calculate the start and end x and y values for the tiles
            // Example: 2560 width, 32 TILE_SIZE, player at 1000, 1000. Scale is already applied to g_nr_of_tiles_x/y.
            // The screen is 80 tiles wide (2560/32 at scale 1), so the left tile is at 1000 - 40 = 960, the right tile is at 1000 + 40 = 1040
            // 
            // startX = (2560/2 = 1280) - ((1000 - 959) * 32) = 1280 - 41 * 32 = 1280 - 1320 = -32
            // startY = (1600/2 = 800) - ((1000 - 979) * 32) = 800 - 26 * 32 = 800 - 832 = -32

            const startX = (currentWidth / 2) - ((g_player_x - left_tile_x) * TILE_SIZE * scale);   // can be negative
            const startY = (currentHeight / 2) - ((g_player_y - top_tile_y) * TILE_SIZE *scale);   // can be negative
            console.log(`startX: ${startX}, startY: ${startY}`);
            
            const tiles = [];
            // Loop through the tiles and add them to the array
            // Note that the tiles are drawn at the original x and y, not the transformed x and y
            // Also note that the TILE_SIZE is multiplied by the scale, so the tiles get larger when zooming in
            // We let drawTile take care of the issue of partial tiles.
            let actualTileSize = TILE_SIZE * scale;
            for (let x = left_tile_x; x < right_tile_x; x += 1) {
                let xpos = startX + ((x - left_tile_x) * actualTileSize);
                for (let y = top_tile_y; y < bottom_tile_y; y += 1) {
                    let ypos = startY + ((y - top_tile_y) * actualTileSize);
                    const terrain = generateTerrain(x, y);
                    tiles.push({ terrain: terrain, x: xpos, y: ypos, size: actualTileSize });
                    ypos += actualTileSize;
                }
                xpos += actualTileSize;
            }
            return tiles;
        }


        // The redraw function will clear the canvas and draw the tiles that are visible on the screen.
        function redraw(transform) {
            context.clearRect(0, 0, canvas.width, canvas.height);
            const tiles = computeTiles(transform);
            tiles.forEach(tile => {
                // const transformedX = tile.x * transform.k + transform.x;
                // const transformedY = tile.y * transform.k + transform.y;
                // drawTile(transformedX, transformedY, tile.size * transform.k);
                drawTile(tile.terrain, tile.x, tile.y, tile.size);
            });
        }


        //////////////////////////////////////////////////////////////////////////////////////////////////////////////////// 
        // Create canvas 
        //////////////////////////////////////////////////////////////////////////////////////////////////////////////////// 

        // Noise.js setup
        // The noise object is a global object that can be used to generate Perlin noise.
        // The seed is set to a fixed value for consistency.
        noise.seed(12345);

        //
        // Now let's set up the canvas and the zoom behavior
        // and use those functions we created earlier
        //

        // Canvas setup
        // Create the canvas and context elements, and append the canvas to the HTML body.
        const canvas = document.createElement("canvas");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        document.body.appendChild(canvas);
        const context = canvas.getContext("2d");

        //////////////////////////////////////////////////////////////////////////////////////////////////////////////////// 
        // Create the event listeners for resize, zoom, and keydown/keyup on the canvas and the window
        ////////////////////////////////////////////////////////////////////////////////////////////////////////////////////

        // Add the behaviour to apply zooming to the canvas
        // The zoom behavior is defined using d3.zoom() and applied to the canvas element.

        // Set the initial zoom level
        let currentTransform = d3.zoomIdentity;

        const zoomBehavior = d3.zoom()
            .scaleExtent([1, 8])
            .on("zoom", ({ transform }) => {
                console.log('transform: ', transform.toString());
                // Apply the new translation relative to the existing translation
                const newTransform = d3.zoomIdentity
                    .translate(currentTransform.x, currentTransform.y)
                    .scale(transform.k);
                console.log('new transform: ', transform.toString());

                currentTransform = newTransform; // Update currentTransform globally
                calculateNrOfTiles(currentTransform);
                calculateNewPlayerPosition(currentTransform);
                redraw(currentTransform);
            });
        // Apply the zoom behavior to the canvas
        d3.select(canvas).call(zoomBehavior);

        // Add a resize listener. This will redraw the tiles when the window is resized.
        // It also debounces the resize event, so it doesn't redraw the tiles too often, using a timer with a short timeout.

        // Declare resizeTimeout outside the eventlistener. Keep it undefined for now.
        let resizeTimeout;

        // Add the event listener for the resize. It redraws the tiles when the window is resized.
        window.addEventListener("resize", () => {
            // Clear the existing timer if there is one already
            if (resizeTimeout) {
                clearTimeout(resizeTimeout);
            }

            // Start a new timer
            resizeTimeout = setTimeout(() => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;

                // Reapply the old currentTransform after resizing
                // This prevents the map from jumping around when resizing
                d3.select(canvas).call(zoomBehavior.transform, currentTransform);
                calculateNrOfTiles(currentTransform);
                calculateNewPlayerPosition(currentTransform);
                redraw(currentTransform);
            }, 100); // Stel de debounce-tijd in (bijvoorbeeld 100 ms)
        });

        // Track the state of the keys
        const keys = {};

        // Add keydown event listeners for the WASD-keys keyup and keydown events, so you can keep pressing the keys to move the player.
        window.addEventListener("keydown", (event) => {
            keys[event.key] = true;
            handleMovement();
        });

        window.addEventListener("keyup", (event) => {
            keys[event.key] = false;
        });

        function handleMovement() {
            let moved = false;

            // Fixed: movement should be one tile per keypress independent of zoom scale.


            if (keys["w"]) {
                currentTransform = currentTransform.translate(0, -MOVE_AMOUNT);
                moved = true;
            }
            if (keys["a"]) {
                currentTransform = currentTransform.translate(-MOVE_AMOUNT, 0);
                moved = true;
            }
            if (keys["s"]) {
                currentTransform = currentTransform.translate(0, MOVE_AMOUNT);
                moved = true;
            }
            if (keys["d"]) {
                currentTransform = currentTransform.translate(MOVE_AMOUNT, 0);
                moved = true;
            }

            if (moved) {
                calculateNrOfTiles(currentTransform);
                calculateNewPlayerPosition(currentTransform);
                redraw(currentTransform);
            }
        }

        //////////////////////////////////////////////////////////////////////////////////////////////////////////////////// 
        // Finish up and show the initial screen
        ////////////////////////////////////////////////////////////////////////////////////////////////////////////////////

        // Ensure the canvas has focus so our keys actually apply to the terrain
        canvas.tabIndex = 1; // Make the canvas focusable
        canvas.focus();

        // Draw the initial screen
        calculateNrOfTiles(currentTransform);
        calculateNewPlayerPosition(currentTransform);
        redraw(currentTransform);
    </script>
</body>
</html>
